// ── Date utils ────────────────────────────────────────────────────────────────
const DAY=['ראשון','שני','שלישי','רביעי','חמישי','שישי','שבת'];
const MON=['ינואר','פברואר','מרץ','אפריל','מאי','יוני','יולי','אוגוסט','ספטמבר','אוקטובר','נובמבר','דצמבר'];
const pd=s=>new Date(s+'T12:00:00');
const fd=d=>`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
const addD=(s,n)=>{const d=pd(s);d.setDate(d.getDate()+n);return fd(d);};
const wkS=s=>{const d=pd(s);d.setDate(d.getDate()-d.getDay());return fd(d);};
const today=()=>fd(new Date());
const dd=s=>{const d=pd(s);return `${d.getDate()}/${d.getMonth()+1}`;};
const inWk=(ds,ws)=>ds>=ws&&ds<addD(ws,7);
const hUntil=(ds,t)=>(new Date(`${ds}T${t}:00`)-new Date())/3600000;
const validT=t=>{const h=parseInt(t,10);return h>=7&&h<24;};
const t2m=t=>{const[h,m]=t.split(':').map(Number);return h*60+m;};
const m2t=m=>`${String(Math.floor(m/60)).padStart(2,'0')}:${String(m%60).padStart(2,'0')}`;
const tDiff=(a,b)=>t2m(b)-t2m(a);
const fmtMon=ym=>{const[y,m]=ym.split('-');return `${MON[+m-1]} ${y}`;};
const monOf=ds=>ds.slice(0,7);
const prevMon=ym=>{const[y,m]=ym.split('-').map(Number);return m===1?`${y-1}-12`:`${y}-${String(m-1).padStart(2,'0')}`;};
const nextMon=ym=>{const[y,m]=ym.split('-').map(Number);return m===12?`${y+1}-01`:`${y}-${String(m+1).padStart(2,'0')}`;};
const monRange=ym=>{const s=`${ym}-01`;const d=pd(s);d.setMonth(d.getMonth()+1);return[s,fd(d)];};
const phoneDigits=p=>(p||'').replace(/[^0-9]/g,'');
const waLink=(phone,text)=>{let d=phoneDigits(phone);if(d.startsWith('0'))d='972'+d.slice(1);else if(!d.startsWith('972'))d='972'+d;return `https://wa.me/${d}?text=${encodeURIComponent(text)}`;};

// ── Week Calendar (8–24, variable item height) ────────────────────────────────
function WeekCal({days,items,renderItem,onColClick}){
  const MN=8,MX=24,PM=1.55,GH=(MX-MN)*60*PM,TW=36,CM=66,DH=45*PM-2;
  const hrs=Array.from({length:MX-MN+1},(_,i)=>MN+i);
  function t2top(t){const[h,m]=t.split(':').map(Number);return((h-MN)*60+m)*PM;}
  function click(di,date,e){
    if(!onColClick)return;
    let tot=e.nativeEvent.offsetY/PM;
    let h=Math.floor(tot/60)+MN,m=Math.round((tot%60)/5)*5;
    if(m>=60){m=0;h++;}
    h=Math.min(Math.max(h,MN),MX-1);
    onColClick(di,date,`${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')}`);
  }
  return(
    <div style={{border:'0.5px solid var(--bd3)',borderRadius:12,overflow:'hidden',background:'#fff',marginBottom:12,direction:'ltr'}}>
      <div style={{overflowX:'auto',overflowY:'auto',maxHeight:520}}>
        <div style={{minWidth:TW+days.length*CM,position:'relative'}}>
          <div style={{display:'flex',position:'sticky',top:0,zIndex:10,background:'var(--bg2)',borderBottom:'1px solid var(--bd3)'}}>
            <div style={{width:TW,flexShrink:0,position:'sticky',left:0,zIndex:11,background:'var(--bg2)'}}/>
            {days.map(day=>{
              const hol=getHol(day.date),isT=fd(new Date())===day.date;
              return(
                <div key={day.date} style={{flex:1,minWidth:CM,textAlign:'center',padding:'7px 2px',borderLeft:'0.5px solid var(--bd3)'}}>
                  <div style={{fontSize:10,color:'var(--tx2)',marginBottom:1}}>יום {DAY[day.di]}</div>
                  <div style={{fontSize:17,fontWeight:600,margin:'0 auto',width:26,height:26,lineHeight:'26px',borderRadius:'50%',color:isT?'#fff':'var(--tx1)',background:isT?'#2563eb':'transparent'}}>{pd(day.date).getDate()}</div>
                  {hol&&<div style={{fontSize:9,color:'var(--txW)',overflow:'hidden',whiteSpace:'nowrap',textOverflow:'ellipsis'}}>{hol.n}</div>}
                </div>
              );
            })}
          </div>
          <div style={{display:'flex',height:GH}}>
            <div style={{width:TW,flexShrink:0,position:'sticky',left:0,zIndex:5,background:'var(--bg2)',height:GH}}>
              {hrs.map(h=><div key={h} style={{position:'absolute',top:(h-MN)*60*PM-7,left:0,right:4,fontSize:9,color:'var(--tx2)',textAlign:'right',userSelect:'none',direction:'ltr',pointerEvents:'none'}}>{h<24?`${String(h).padStart(2,'0')}:00`:'00:00'}</div>)}
            </div>
            {days.map(day=>(
              <div key={day.date} style={{flex:1,minWidth:CM,height:GH,position:'relative',borderLeft:'0.5px solid var(--bd3)',cursor:onColClick?'crosshair':'default'}} onClick={e=>click(day.di,day.date,e)}>
                {hrs.map(h=><div key={h} style={{position:'absolute',top:(h-MN)*60*PM,left:0,right:0,borderTop:'0.5px solid var(--bd3)',opacity:.35,pointerEvents:'none'}}/>)}
                {hrs.map(h=><div key={`hh${h}`} style={{position:'absolute',top:((h-MN)*60+30)*PM,left:0,right:0,borderTop:'0.5px dashed var(--bd3)',opacity:.18,pointerEvents:'none'}}/>)}
                {items.filter(it=>it.date===day.date).map(it=>{
                  const top=t2top(it.time||it.startTime||'09:00');
                  const ht=it.durationMins?it.durationMins*PM-2:DH;
                  return renderItem(it,top,ht);
                })}
              </div>
            ))}
          </div>
        </div>
      </div>
    </div>
  );
}

// ── genLessons ────────────────────────────────────────────────────────────────
function genLessons(students,startFrom=BIZ_START){
  const L=[];
  const sixMonthsOut=new Date();sixMonthsOut.setMonth(sixMonthsOut.getMonth()+6);
  const GEN_END=fd(sixMonthsOut)<BIZ_END?fd(sixMonthsOut):BIZ_END;
  students.filter(s=>s.type==='fixed').forEach(s=>{
    let d=pd(startFrom);
    let _g=0;while(d.getDay()!==s.di&&_g++<8)d.setDate(d.getDate()+1);
    while(fd(d)<=GEN_END){
      const ds=fd(d);
      L.push({id:`${s.id}_${ds}`,sid:s.id,date:ds,time:s.t,status:'scheduled',reason:'',cancelledAt:null});
      d.setDate(d.getDate()+7);
    }
  });
  return L;
}

function RegisterView({db}){
  const [name,setName]=useState('');
  const [phone,setPhone]=useState('');

    if(!name.trim()||!phone.trim())return;
    setBusy(true);

      await db.collection(C.pend).add({name:name.trim(),phone:phone.trim(),parent:parent.trim(),di:hasPref?di:null,t:hasPref?time:null,submittedAt:new Date().toISOString()});
      setDone(true);
    }catch(e){console.error(e);}
    setBusy(false);

  if(done)return(
    <div style={{display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',minHeight:'100vh',gap:16,padding:20,background:'var(--bg3)'}}>
      <div style={{fontSize:52}}>✅</div>

    </div>
  );
  return(
    <div style={{direction:'rtl',fontFamily:'var(--font)',minHeight:'100vh',background:'var(--bg3)',display:'flex',alignItems:'center',justifyContent:'center',padding:16}}>
      <div style={{width:'100%',maxWidth:360}}>

        <p style={{fontSize:13,color:'var(--tx2)',textAlign:'center',marginBottom:20}}>טופס הרשמה לתלמיד חדש</p>
        <div style={{background:'#fff',borderRadius:'var(--r1)',padding:'16px 14px',border:'0.5px solid var(--bd3)'}}>
          {[['שם מלא *',name,setName,'text','שם פרטי ומשפחה'],['טלפון *',phone,setPhone,'tel','050-0000000'],['שם הורה / איש קשר',parent,setParent,'text','אופציונלי']].map(([lbl,val,set,type,ph])=>(
            <div key={lbl} style={{marginBottom:12}}>
              <div style={S.lbl}>{lbl}</div>
              <input type={type} style={S.inp} value={val} onChange={e=>set(e.target.value)} placeholder={ph}/>
            </div>
          ))}
          <label style={{display:'flex',alignItems:'center',gap:10,cursor:'pointer',padding:'10px 12px',borderRadius:8,border:`1px solid ${hasPref?'var(--tx1)':'var(--bd3)'}`,background:hasPref?'var(--bg2)':'transparent',marginBottom:12}}>

            <div><div style={{fontSize:13,fontWeight:500}}>יש לי שעה מועדפת</div><div style={{fontSize:11,color:'var(--tx2)',marginTop:2}}>אציין יום ושעה</div></div>
          </label>
          {hasPref&&(
            <div style={{display:'flex',gap:8,marginBottom:12}}>
              <div style={{flex:1}}><div style={S.lbl}>יום</div>
                <select style={S.inp} value={di} onChange={e=>setDi(Number(e.target.value))}>
                  {[0,1,2,3,4].map(d=><option key={d} value={d}>יום {DAY[d]}</option>)}
                </select></div>
              <div style={{flex:1}}><div style={S.lbl}>שעה</div>
                <input type="time" step="900" style={S.inp} value={time} onChange={e=>setTime(e.target.value)}/></div>
            </div>
          )}
          <button style={{width:'100%',padding:'10px',fontSize:14,fontWeight:500,borderRadius:8,cursor:(name.trim()&&phone.trim()&&!busy)?'pointer':'not-allowed',border:'none',background:(name.trim()&&phone.trim()&&!busy)?'var(--tx1)':'var(--bg2)',color:(name.trim()&&phone.trim()&&!busy)?'#fff':'var(--tx2)',marginTop:4}} disabled={!name.trim()||!phone.trim()||busy} onClick={submit}>{busy?'שולח...':'שלח בקשת הרשמה'}</button>

        {[['week','השבוע'],['nextweek','שבוע הבא'],['events',`אירועים${evtCnt?` (${evtCnt})`:''}` ],['students','תלמידים'],['finance','כספים'],['requests',`בקשות${pendCnt?` (${pendCnt})`:''}`]].map(([t,l])=>(
          <button key={t} style={S.tab(tab===t)} onClick={()=>setTab(t)}>{l}</button>
        ))}
      </div>
      <div style={S.body}>
        {tab==='week'     && <TeacherWeekTab     ctx={ctx}/>}
        {tab==='nextweek' && <TeacherNextWeekTab ctx={ctx}/>}
        {tab==='events'   && <TeacherEventsTab   ctx={ctx}/>}
        {tab==='students' && <TeacherStudentsTab ctx={ctx}/>}
        {tab==='finance'  && <TeacherFinanceTab  ctx={ctx}/>}
        {tab==='requests' && <TeacherRequestsTab ctx={ctx}/>}
        {tab==='gcal'     && <GCalTab            ctx={ctx}/>}
      </div>
    </div>
  );
}

// ── This Week (unified: lessons + events) ─────────────────────────────────────
function TeacherWeekTab({ctx}){
  const {lessons,students,events,THIS_WK,NEXT_WK,updLesson,addLesson,baseSlots,TODAY}=ctx;
  const [sel,setSel]=useState(null);
  const [subView,setSubView]=useState(null); // 'cancel'|'move'|'register'
  const [colSlot,setColSlot]=useState(null); // {di,date,time}

  function closeAll(){setSel(null);setSubView(null);setColSlot(null);}

  const days=useMemo(()=>{
    const dSet=new Set();
    for(let i=0;i<6;i++) dSet.add(addD(THIS_WK,i));
    events.filter(e=>inWk(e.date,THIS_WK)).forEach(e=>dSet.add(e.date));
    return [...dSet].sort().map(date=>({date,di:pd(date).getDay()}));
  },[THIS_WK,events]);

  const items=useMemo(()=>[
    ...lessons.filter(l=>inWk(l.date,THIS_WK)).map(l=>({...l,_t:'lesson',durationMins:45})),
    ...events.filter(e=>inWk(e.date,THIS_WK)).map(e=>({...e,_t:'event',time:e.startTime,durationMins:(e.startTime&&e.endTime&&e.endTime>e.startTime)?tDiff(e.startTime,e.endTime):60})),
  ],[lessons,events,THIS_WK]);

  function getAvailSlots(excludeDate,excludeTime,excludeSid){
    const slots=[];
    baseSlots.filter(s=>validT(s.t)).forEach(s=>{
      [[THIS_WK,'this'],[NEXT_WK,'next']].forEach(([wk,wkLabel])=>{
        let d=pd(wk);let _g=0;while(d.getDay()!==s.di&&_g++<8)d.setDate(d.getDate()+1);
        const date=fd(d);
        if(date<TODAY)return;
        if(date===excludeDate&&s.t===excludeTime)return;
        const taken=lessons.some(l=>l.date===date&&l.time===s.t&&['scheduled','pending_cancel'].includes(l.status)&&(!excludeSid||l.sid!==excludeSid)&&students.some(st=>st.id===l.sid));
        if(!taken)slots.push({date,time:s.t,di:s.di,week:wkLabel});
      });
    });
    return slots.sort((a,b)=>a.date.localeCompare(b.date)||a.time.localeCompare(b.time));
  }

  function renderItem(it,top,ht){
    if(it._t==='event'){
      const et=ETYPES[it.type]||ETYPES.performance;
      return(
        <div key={it.id} onClick={e=>{e.stopPropagation();setSel(it);}} style={{position:'absolute',top,left:2,right:2,height:ht,background:et.bg,border:`1px solid ${et.border}`,borderRadius:5,padding:'3px 5px',cursor:'pointer',overflow:'hidden'}}>
          <div style={{fontSize:11,fontWeight:700,color:et.color,overflow:'hidden',whiteSpace:'nowrap',textOverflow:'ellipsis'}}>{et.icon} {it.title}</div>
          <div style={{fontSize:10,color:et.color}}>{it.startTime}{it.endTime?`–${it.endTime}`:''}</div>
          {it.price&&<div style={{fontSize:9,color:et.color}}>₪{it.price}{it.paidStatus==='paid'?' ✓':it.paidStatus==='partial'?' (חלקי)':''}</div>}
        </div>
      );
    }
    const stu=students.find(s=>s.id===it.sid);
    const pend=it.status==='pending_cancel';
    const canc=['cancelled_justified','cancelled_unjustified','teacher_cancelled','no_show','moved'].includes(it.status);
    const bg=pend?'#fef3c7':canc?'#f1f5f9':'#dbeafe';
    const fg=pend?'#92400e':canc?'#94a3b8':'#1e40af';
    const bd=pend?'#fcd34d':canc?'#cbd5e1':'#93c5fd';
    return(
      <div key={it.id} onClick={e=>{e.stopPropagation();setSel(it);setSubView(canc?'register':null);}} style={{position:'absolute',top,left:2,right:2,height:ht,background:bg,border:`1px solid ${bd}`,borderRadius:5,padding:'3px 5px',cursor:'pointer',overflow:'hidden',opacity:canc?.55:1}}>
        <div style={{fontSize:11,fontWeight:700,color:fg,overflow:'hidden',whiteSpace:'nowrap',textOverflow:'ellipsis'}}>{stu?.name}</div>
        <div style={{fontSize:10,color:fg}}>{it.time}</div>
        {pend&&<div style={{fontSize:9,color:fg}}>⏳</div>}
        {canc&&<div style={{fontSize:9,color:fg}}>✗ בוטל · לחץ לשיבוץ</div>}
      </div>
    );
  }

  return(
    <div>
      <div style={{fontSize:12,color:'var(--tx2)',textAlign:'center',marginBottom:8}}>שבוע {dd(THIS_WK)} – {dd(addD(THIS_WK,6))}</div>
      <div style={{...S.row,gap:8,marginBottom:8,flexWrap:'wrap'}}>
        {[['#dbeafe','#1e40af','שיעור'],...Object.values(ETYPES).map(et=>[et.bg,et.color,et.label])].map(([bg,fg,l])=>(
          <div key={l} style={{...S.row,gap:3}}><div style={{width:9,height:9,borderRadius:2,background:bg,border:`1px solid ${fg}`,flexShrink:0}}/><span style={{fontSize:10,color:'var(--tx2)'}}>{l}</span></div>
        ))}
      </div>
      {days.length===0?(
        <div style={{textAlign:'center',padding:'40px 0',color:'var(--tx2)',fontSize:14}}>אין פעילות מתוכננת השבוע</div>
      ):(
        <>
          <WeekCal days={days} items={items} renderItem={renderItem} onColClick={(di,date,t)=>{setSubView(null);setSel(null);setColSlot({di,date,time:t});}}/>
          <div style={{fontSize:11,color:'var(--tx2)',textAlign:'center',marginTop:-4,marginBottom:6}}>לחץ על תלמיד לעריכה/ביטול · לחץ על שעה ריקה לשיבוץ</div>
        </>
      )}
      {sel&&sel._t==='event'&&(
        <Modal onClose={closeAll}>
          {(()=>{const et=ETYPES[sel.type]||ETYPES.performance;return(
            <div style={{direction:'rtl'}}>
              <div style={{fontSize:17,fontWeight:600,marginBottom:4}}>{et.icon} {sel.title}</div>
              <div style={{fontSize:13,color:'var(--tx2)',marginBottom:10}}>יום {DAY[pd(sel.date).getDay()]} · {dd(sel.date)} · {sel.startTime}{sel.endTime?`–${sel.endTime}`:''}</div>
              {sel.location&&<div style={{fontSize:13,marginBottom:4}}>📍 {sel.location}</div>}
              {sel.price&&<div style={{fontSize:13,marginBottom:4}}>₪{sel.price} · <span style={S.bdg(PAY_S[sel.paidStatus||'unpaid'].color)}>{PAY_S[sel.paidStatus||'unpaid'].label}</span></div>}
              {sel.notes&&<div style={{fontSize:12,color:'var(--tx2)',marginTop:8}}>{sel.notes}</div>}
              <button style={{...S.btn('ghost'),width:'100%',marginTop:16}} onClick={closeAll}>סגור</button>
            </div>
          );})()}
        </Modal>
      )}
      {sel&&sel._t==='lesson'&&(
        <Modal onClose={closeAll}>
          <div style={{direction:'rtl'}}>
            {!subView&&(
              <>
                <div style={{fontSize:17,fontWeight:600,marginBottom:4}}>{students.find(s=>s.id===sel.sid)?.name}</div>
                <div style={{fontSize:13,color:'var(--tx2)',marginBottom:8}}>יום {DAY[pd(sel.date).getDay()]} · {dd(sel.date)} · {sel.time}</div>
                <div style={{marginBottom:12}}><SBadge status={sel.status}/></div>
                {sel.reason&&<p style={{fontSize:13,color:'var(--tx2)',margin:'0 0 12px'}}>סיבה: {sel.reason}</p>}
                {(sel.status==='scheduled'||sel.status==='pending_cancel')&&(
                  <>
                    <button style={{...S.btn('info'),width:'100%',marginBottom:8,textAlign:'right'}} onClick={()=>setSubView('move')}>✏️ הזז שיעור</button>
                    <button style={{...S.btn('warning'),width:'100%',marginBottom:8,textAlign:'right'}} onClick={()=>setSubView('register')}>🔄 החלף תלמיד</button>
                    <button style={{...S.btn('danger'),width:'100%',marginBottom:8,textAlign:'right'}} onClick={()=>setSubView('cancel')}>❌ בטל שיעור</button>
                  </>
                )}
                {!['scheduled','pending_cancel'].includes(sel.status)&&(
                  <button style={{...S.btn('info'),width:'100%',marginBottom:8,textAlign:'right'}} onClick={()=>setSubView('register')}>📝 רשום תלמיד אחר לשעה זו</button>
                )}
                <button style={{...S.btn('ghost'),width:'100%',marginTop:4}} onClick={closeAll}>סגור</button>
              </>
            )}
            {subView==='cancel'&&(
              <>
                <div style={{fontSize:15,fontWeight:600,marginBottom:4}}>ביטול שיעור — {students.find(s=>s.id===sel.sid)?.name}</div>
                <p style={{fontSize:13,color:'var(--tx2)',margin:'0 0 14px'}}>{dd(sel.date)} · {sel.time}</p>
                <button style={{...S.btn('success'),width:'100%',marginBottom:8,textAlign:'right',padding:'10px 14px'}} onClick={()=>{updLesson(sel.id,{status:'cancelled_justified'});closeAll();}}>
                  <div><div style={{fontWeight:600}}>✅ מוצדק</div><div style={{fontSize:11,marginTop:2,opacity:.8}}>מחלה, נסיבות בלתי צפויות — לא ייחשב בתשלום</div></div>
                </button>
                <button style={{...S.btn('danger'),width:'100%',marginBottom:8,textAlign:'right',padding:'10px 14px'}} onClick={()=>{updLesson(sel.id,{status:'cancelled_unjustified'});closeAll();}}>
                  <div><div style={{fontWeight:600}}>❌ לא מוצדק</div><div style={{fontSize:11,marginTop:2,opacity:.8}}>ביטול ללא סיבה — ייחשב בתשלום</div></div>
                </button>
                <button style={{...S.btn('info'),width:'100%',marginBottom:12,textAlign:'right',padding:'10px 14px'}} onClick={()=>{updLesson(sel.id,{status:'teacher_cancelled'});closeAll();}}>
                  <div><div style={{fontWeight:600}}>🎸 בוטל ע"י המורה</div><div style={{fontSize:11,marginTop:2,opacity:.8}}>לא ייחשב בתשלום</div></div>
                </button>
                <button style={{...S.btn('ghost'),width:'100%'}} onClick={()=>setSubView(null)}>← חזרה</button>
              </>
            )}
            {subView==='move'&&(()=>{
              const slots=getAvailSlots(sel.date,sel.time,sel.sid);
              const selStu=students.find(s=>s.id===sel.sid);
              return(
                <>
                  <div style={{fontSize:15,fontWeight:600,marginBottom:4}}>הזזת שיעור — {selStu?.name}</div>
                  <div style={{background:'var(--bg2)',borderRadius:8,padding:'8px 12px',marginBottom:12}}>
                    <div style={{fontSize:11,color:'var(--tx2)',marginBottom:2}}>שיעור נוכחי</div>
                    <div style={{fontSize:14,fontWeight:500}}>יום {DAY[pd(sel.date).getDay()]} {dd(sel.date)} · {sel.time}</div>
                  </div>
                  {slots.length===0?<div style={{fontSize:13,color:'var(--tx2)',textAlign:'center',padding:'12px 0'}}>אין שעות פנויות</div>:(
                    ['this','next'].map(wk=>{
                      const ws=slots.filter(s=>s.week===wk);
                      if(!ws.length)return null;
                      return(<div key={wk} style={{marginBottom:10}}>
                        <div style={{fontSize:11,fontWeight:600,color:'var(--tx2)',marginBottom:6}}>{wk==='this'?'השבוע':'שבוע הבא'}</div>
                        {ws.map(sl=>{
                          const isReg=selStu?.type==='fixed'&&sl.di===selStu.di&&sl.time===selStu.t;
                          return(
                            <button key={`${sl.date}_${sl.time}`} style={{...S.btn(isReg?'info':'default'),marginBottom:5,width:'100%',textAlign:'right'}} onClick={()=>{updLesson(sel.id,{status:'moved'});addLesson({sid:sel.sid,date:sl.date,time:sl.time,status:'scheduled',reason:'',durationMins:45,weekStart:wkS(sl.date)});closeAll();}}>
                              יום {DAY[sl.di]} {dd(sl.date)} · {sl.time}
                              {isReg&&<span style={{fontSize:10,color:'var(--txI)',marginRight:8}}>⭐ קבועה</span>}
                            </button>
                          );
                        })}
                      </div>);
                    })
                  )}
                  <button style={{...S.btn('ghost'),width:'100%',marginTop:4}} onClick={()=>setSubView(null)}>← חזרה</button>
                </>

            {subView==='register'&&(()=>{
              const alreadyAt=new Set(lessons.filter(l=>l.date===sel.date&&l.time===sel.time&&['scheduled','pending_cancel'].includes(l.status)&&l.id!==sel.id).map(l=>l.sid));
              const stuList=students.filter(s=>!alreadyAt.has(s.id)&&s.id!==sel.sid);
              return(
                <>
                  <div style={{fontSize:15,fontWeight:600,marginBottom:4}}>רישום תלמיד — {dd(sel.date)} · {sel.time}</div>
                  {stuList.length===0?<div style={{fontSize:13,color:'var(--tx2)',textAlign:'center',padding:'12px 0'}}>אין תלמידים זמינים</div>:(
                    stuList.map(s=>(
                      <button key={s.id} style={{...S.btn('default'),marginBottom:5,width:'100%',textAlign:'right'}} onClick={()=>{
                        if(['scheduled','pending_cancel'].includes(sel.status))updLesson(sel.id,{status:'teacher_cancelled'});

                      }}>
                        {s.name}<span style={{fontSize:11,color:'var(--tx2)',marginRight:6}}> · {s.type==='fixed'?'קבוע':'נייד'}</span>
                      </button>
                    ))
                  )}
                  <button style={{...S.btn('ghost'),width:'100%',marginTop:4}} onClick={()=>setSubView(null)}>← חזרה</button>
                </>
              );
            })()}
          </div>
        </Modal>
      )}
      {colSlot&&(
        <Modal onClose={closeAll}>
          <div style={{direction:'rtl'}}>
            <div style={{fontSize:17,fontWeight:600,marginBottom:4}}>שיבוץ תלמיד</div>
            <div style={{fontSize:13,color:'var(--tx2)',marginBottom:10}}>יום {DAY[colSlot.di]} · {dd(colSlot.date)}</div>
            <div style={{marginBottom:12}}>
              <div style={S.lbl}>שעה</div>
              <input type="time" step="300" style={S.inp} value={colSlot.time} onChange={e=>setColSlot({...colSlot,time:e.target.value})}/>
            </div>
            <div style={{fontSize:12,color:'var(--tx2)',marginBottom:10}}>בחר תלמיד לשיבוץ:</div>
            {(()=>{
              const alreadyAt=new Set(lessons.filter(l=>l.date===colSlot.date&&l.time===colSlot.time&&['scheduled','pending_cancel'].includes(l.status)).map(l=>l.sid));
              const stuList=students.filter(s=>!alreadyAt.has(s.id));
              return stuList.length===0
                ?<div style={{fontSize:13,color:'var(--tx2)',textAlign:'center',padding:'12px 0'}}>אין תלמידים זמינים</div>
                :stuList.map(s=>(
                  <button key={s.id} style={{...S.btn('default'),marginBottom:5,width:'100%',textAlign:'right'}} onClick={()=>{addLesson({sid:s.id,date:colSlot.date,time:colSlot.time,status:'scheduled',reason:'',durationMins:45,weekStart:wkS(colSlot.date)});closeAll();}}>
                    {s.name}<span style={{fontSize:11,color:'var(--tx2)',marginRight:6}}> · {s.type==='fixed'?'קבוע':'נייד'}</span>
                  </button>
                ));
            })()}
            <button style={{...S.btn('ghost'),width:'100%',marginTop:8}} onClick={closeAll}>סגור</button>
          </div>
        </Modal>
      )}
    </div>
  );
}

// ── Next Week Planning ─────────────────────────────────────────────────────────
function TeacherNextWeekTab({ctx}){
  const {students,lessons,events,NEXT_WK,pubNext,updLesson,addLesson,pubWeek,baseSlots,addBaseSlot,removeBaseSlot,moveBaseSlot,clearPublishedWeek,fixOrphanedSlot,syncWeekToGCal}=ctx;
  const [cancelledIds,setCancelledIds]=useState(pubNext?.cancelledIds||[]);
  const [blockedSlots,setBlockedSlots]=useState(pubNext?.blockedSlots||[]);
  const [extraSlots,setExtraSlots]=useState(pubNext?.extraSlots||[]);
  const [note,setNote]=useState(pubNext?.note||'');
  const [wasPublished,setWasPublished]=useState(!!pubNext);
  const [sel,setSel]=useState(null);
  const [addingSlot,setAddingSlot]=useState(false);
  const [addingOpen,setAddingOpen]=useState(false);
  const [resetConf,setResetConf]=useState(false);
  const [movingSlot,setMovingSlot]=useState(null);
  const [moveToDi,setMoveToDi]=useState(1);
  const [moveToT,setMoveToT]=useState('09:00');
  const [newDi,setNewDi]=useState(1);
  const [newT,setNewT]=useState('13:00');
  const [syncMsg,setSyncMsg]=useState('');
  const [assigningToSlot,setAssigningToSlot]=useState(false);

  const teachingDays=useMemo(()=>{
    const dSet=new Set([0,1,2,3,4,5]);
    extraSlots.forEach(s=>dSet.add(s.di));
    events.filter(e=>inWk(e.date,NEXT_WK)).forEach(e=>dSet.add(pd(e.date).getDay()));
    return [...dSet].sort().map(di=>{let d=pd(NEXT_WK);let _g=0;while(d.getDay()!==di&&_g++<8)d.setDate(d.getDate()+1);return{date:fd(d),di};});
  },[NEXT_WK,extraSlots,events]);

  const calItems=useMemo(()=>{
    const items=[];const used=new Set();
    baseSlots.forEach(slot=>{
      let d=pd(NEXT_WK);let _g=0;while(d.getDay()!==slot.di&&_g++<8)d.setDate(d.getDate()+1);
      const date=fd(d);const key=`${date}_${slot.t}`;
      if(used.has(key))return;used.add(key);
      const isBlocked=blockedSlots.some(b=>b.di===slot.di&&b.t===slot.t);
      const isCancelled=slot.sid?cancelledIds.includes(slot.sid):false;
      const fixedStu=slot.sid?students.find(s=>s.id===slot.sid):null;
      const lesson=lessons.find(l=>l.date===date&&l.time===slot.t&&['scheduled','pending_cancel'].includes(l.status));
      const bookedStu=lesson?students.find(s=>s.id===lesson.sid):null;
      const flexStu=bookedStu&&bookedStu.id!==(slot.sid||'')?bookedStu:null;
      const isOrphaned=!!(slot.sid&&!fixedStu);
      const isPermOpen=!slot.sid||isOrphaned;
      items.push({id:key,date,time:slot.t,di:slot.di,lesson,fixedStu,flexStu,isCancelled,isBlocked,isExtra:false,isPermOpen,isOrphaned,isEmpty:!fixedStu&&!lesson&&!isBlocked&&!isOrphaned,durationMins:45,_t:'slot'});
    });
    extraSlots.forEach(slot=>{
      let d=pd(NEXT_WK);let _g=0;while(d.getDay()!==slot.di&&_g++<8)d.setDate(d.getDate()+1);
      const date=fd(d);const key=`extra_${date}_${slot.t}`;
      if(used.has(key))return;used.add(key);
      const lesson=lessons.find(l=>l.date===date&&l.time===slot.t&&['scheduled','pending_cancel'].includes(l.status));
      const bookedStu=lesson?students.find(s=>s.id===lesson.sid):null;
      items.push({id:key,date,time:slot.t,di:slot.di,lesson,fixedStu:null,flexStu:bookedStu||null,isCancelled:false,isBlocked:false,isExtra:true,isEmpty:!lesson,durationMins:45,_t:'slot'});
    });
    lessons.forEach(lesson=>{
      if(!['scheduled','pending_cancel'].includes(lesson.status))return;
      if(!inWk(lesson.date,NEXT_WK))return;
      const key=`${lesson.date}_${lesson.time}`;
      if(used.has(key)||used.has(`extra_${lesson.date}_${lesson.time}`))return;
      if(!validT(lesson.time))return;
      const bookedStu=students.find(s=>s.id===lesson.sid);
      if(!bookedStu)return;
      used.add(key);
      items.push({id:key,date:lesson.date,time:lesson.time,di:pd(lesson.date).getDay(),lesson,fixedStu:null,flexStu:bookedStu,isCancelled:false,isBlocked:false,isExtra:true,isPermOpen:false,isOrphaned:false,isEmpty:false,durationMins:45,_t:'slot'});
    });
    // Add events for next week (read-only display)
    events.filter(e=>inWk(e.date,NEXT_WK)).forEach(e=>{
      items.push({...e,_t:'event',time:e.startTime,durationMins:e.endTime?tDiff(e.startTime,e.endTime):60});
    });
    return items;
  },[NEXT_WK,lessons,students,cancelledIds,blockedSlots,extraSlots,baseSlots,events]);

  function renderItem(item,top,ht){
    if(item._t==='event'){
      const et=ETYPES[item.type]||ETYPES.performance;
      return(
        <div key={item.id} style={{position:'absolute',top,left:2,right:2,height:ht,background:et.bg,border:`1px solid ${et.border}`,borderRadius:5,padding:'3px 5px',overflow:'hidden',pointerEvents:'none',opacity:.8}}>
          <div style={{fontSize:10,fontWeight:700,color:et.color}}>{et.icon} {item.title}</div>
          <div style={{fontSize:9,color:et.color}}>{item.startTime}{item.endTime?`–${item.endTime}`:''}</div>
        </div>
      );
    }
    const {isBlocked,fixedStu,flexStu,isCancelled,isExtra,isEmpty,isPermOpen,isOrphaned}=item;
    let bg,fg,bd,lbl;
    if(isBlocked)      {bg='#fee2e2';fg='#991b1b';bd='#fca5a5';lbl='🚫 חסום';}
    else if(fixedStu&&!isCancelled&&!flexStu){bg='#dbeafe';fg='#1e40af';bd='#93c5fd';lbl=fixedStu.name;}
    else if(flexStu&&!isBlocked)             {bg='#dcfce7';fg='#166534';bd='#86efac';lbl=flexStu.name;}
    else if(fixedStu&&isCancelled&&!flexStu) {bg='#f1f5f9';fg='#94a3b8';bd='#cbd5e1';lbl=`${fixedStu.name} (הוסר)`;}
    else if(isExtra&&isEmpty)                {bg='#fef9c3';fg='#78350f';bd='#fde68a';lbl='⭐ חריגה';}
    else if(isOrphaned)                      {bg='#ffedd5';fg='#9a3412';bd='#fed7aa';lbl='⚠️ תלמיד שנמחק';}
    else if(isPermOpen&&!isOrphaned&&!flexStu){bg='#ccfbf1';fg='#0f766e';bd='#5eead4';lbl='🔓 פנוי';}
    else                                     {bg='#f8fafc';fg='#cbd5e1';bd='#e2e8f0';lbl='פנוי';}
    return(
      <div key={item.id} onClick={e=>{e.stopPropagation();setAssigningToSlot(false);setSel(item);}} style={{position:'absolute',top,left:2,right:2,height:ht,background:bg,border:`1px solid ${bd}`,borderRadius:5,padding:'3px 5px',cursor:'pointer',overflow:'hidden',opacity:(isCancelled||isBlocked)?.55:1}}>
        <div style={{fontSize:11,fontWeight:700,color:fg,overflow:'hidden',whiteSpace:'nowrap',textOverflow:'ellipsis'}}>{lbl}</div>
        <div style={{fontSize:10,color:fg}}>{item.time}</div>
      </div>
    );
  }

  function handleAction(action){
    if(!sel)return;
    if(action==='block')     {setBlockedSlots(bs=>[...bs.filter(b=>!(b.di===sel.di&&b.t===sel.time)),{di:sel.di,t:sel.time}]);if(sel.fixedStu)setCancelledIds(ids=>ids.includes(sel.fixedStu.id)?ids:[...ids,sel.fixedStu.id]);}
    else if(action==='remove_student') {if(sel.fixedStu)setCancelledIds(ids=>[...ids,sel.fixedStu.id]);}
    else if(action==='restore')        {setCancelledIds(ids=>ids.filter(id=>id!==sel.fixedStu?.id));setBlockedSlots(bs=>bs.filter(b=>!(b.di===sel.di&&b.t===sel.time)));}
    else if(action==='unblock')        {setBlockedSlots(bs=>bs.filter(b=>!(b.di===sel.di&&b.t===sel.time)));}
    else if(action==='remove_flex')    {if(sel.lesson)updLesson(sel.lesson.id,{status:'teacher_cancelled'});}
    else if(action==='remove_extra')   {setExtraSlots(es=>es.filter(e=>!(e.di===sel.di&&e.t===sel.time)));}
    else if(action==='del_perm')       {removeBaseSlot(sel.di,sel.time);}
    else if(action==='fix_orphan')     {fixOrphanedSlot(sel.di,sel.time);}
    setSel(null);
  }

  async function doSync(){
    setSyncMsg('מסנכרן...');
    const weekLessons=lessons.filter(l=>inWk(l.date,NEXT_WK)&&l.status==='scheduled');
    await syncWeekToGCal(NEXT_WK,weekLessons);
    setSyncMsg('✓ סונכרן בהצלחה');
    setTimeout(()=>setSyncMsg(''),3000);
  }

  function endT(t){const[h,m]=t.split(':').map(Number);const e=h*60+m+45;return m2t(e);}
  const dayOpts=[0,1,2,3,4,5].map(di=>({v:di,l:`יום ${DAY[di]}`}));

  return(
    <div>
      <div style={{...S.card,border:'1.5px solid var(--bd2)',background:'#f8fbff',marginBottom:10}}>
        <div style={{...S.row,justifyContent:'space-between',marginBottom:8}}>
          <span style={{fontSize:13,fontWeight:600,color:'var(--blueD)'}}>שבוע {dd(NEXT_WK)} – {dd(addD(NEXT_WK,6))}{wasPublished&&<span style={{...S.bdg('success'),marginRight:8}}>פורסם ✓</span>}</span>
        </div>
        <div style={S.lbl}>הערה לתלמידים (אופציונלי)</div>
        <textarea style={{...S.inp,minHeight:48,resize:'vertical',marginBottom:10}} placeholder="למשל: ביום שלישי אני זמין גם בערב..." value={note} onChange={e=>setNote(e.target.value)}/>
        <div style={{...S.row,justifyContent:'space-between',flexWrap:'wrap',gap:8}}>
          <div style={{display:'flex',gap:8,flexWrap:'wrap'}}>
            <button style={S.btn('info')} onClick={()=>setAddingSlot(true)}>＋ שעה חריגה</button>
            <button style={{...S.btn('success'),background:'#ccfbf1',color:'#0f766e',borderColor:'#5eead4'}} onClick={()=>setAddingOpen(true)}>＋ שעה פנויה קבועה</button>
          </div>
          <div style={{display:'flex',gap:8,alignItems:'center',flexWrap:'wrap'}}>
            {syncMsg&&<span style={{fontSize:12,color:'var(--txS)'}}>{syncMsg}</span>}
            <button style={{...S.btn('ghost'),fontSize:12}} onClick={doSync}>📅 שלח ליומן</button>
            <button style={{...S.btn('ghost'),color:'#dc2626',borderColor:'#fca5a5',fontSize:12}} onClick={()=>setResetConf(true)}>🗑 נקה</button>
            <button style={S.btn('primary')} onClick={()=>{pubWeek(NEXT_WK,cancelledIds,blockedSlots,extraSlots,note);setWasPublished(true);}}>{wasPublished?'עדכן פרסום':'פרסם לתלמידים'}</button>
          </div>
        </div>
      </div>

      <div style={{...S.row,gap:8,marginBottom:8,flexWrap:'wrap'}}>
        {[['#dbeafe','#1e40af','קבוע'],['#dcfce7','#166534','נרשם'],['#ccfbf1','#0f766e','פנוי קבוע'],['#f8fafc','#cbd5e1','פנוי'],['#f1f5f9','#94a3b8','הוסר'],['#fee2e2','#991b1b','חסום'],['#fef9c3','#78350f','חריגה'],...Object.values(ETYPES).map(et=>[et.bg,et.color,et.label])].map(([bg,fg,l])=>(
          <div key={l} style={{...S.row,gap:3}}><div style={{width:9,height:9,borderRadius:2,background:bg,border:`1px solid ${fg}`,flexShrink:0}}/><span style={{fontSize:10,color:'var(--tx2)'}}>{l}</span></div>
        ))}
      </div>

      <WeekCal days={teachingDays} items={calItems} renderItem={renderItem} onColClick={(di,date,t)=>{setNewDi(di);setNewT(t);setAddingSlot(true);}}/>

      {/* Action modal */}
      {sel&&sel._t==='slot'&&(
        <Modal onClose={()=>{setSel(null);setAssigningToSlot(false);}}>
          <div style={{fontSize:15,fontWeight:600,marginBottom:4,direction:'rtl'}}>יום {DAY[sel.di]} · {sel.time}</div>
          {sel.isBlocked&&<><p style={{fontSize:13,color:'var(--tx2)',margin:'6px 0 14px',direction:'rtl'}}>השעה חסומה</p><button style={{...S.btn('success'),width:'100%',marginBottom:8}} onClick={()=>handleAction('unblock')}>בטל חסימה</button></>}
          {sel.fixedStu&&!sel.isCancelled&&!sel.isBlocked&&!sel.flexStu&&(
            <div style={{direction:'rtl'}}>
              <p style={{fontSize:13,color:'var(--tx2)',margin:'6px 0 10px'}}>שיעור קבוע: <strong>{sel.fixedStu.name}</strong></p>
              <button style={{...S.btn('info'),width:'100%',marginBottom:8,textAlign:'right'}} onClick={()=>{setMovingSlot({di:sel.di,t:sel.time,sid:sel.fixedStu.id});setMoveToDi(sel.di);setMoveToT(sel.time);setSel(null);}}>✏️ שנה שעה קבועה</button>
              <button style={{...S.btn('danger'),width:'100%',marginBottom:8,textAlign:'right'}} onClick={()=>handleAction('block')}>🚫 חסום שבוע הבא בלבד</button>
              <button style={{...S.btn('warning'),width:'100%',marginBottom:8,textAlign:'right'}} onClick={()=>handleAction('remove_student')}>הסר תלמיד לשבוע הבא</button>
              <button style={{...S.btn('danger'),width:'100%',textAlign:'right'}} onClick={()=>handleAction('del_perm')}>🗑 בטל שיעור קבוע לצמיתות</button>
            </div>
          )}
          {sel.fixedStu&&sel.isCancelled&&!sel.isBlocked&&!sel.flexStu&&(
            <div style={{direction:'rtl'}}>
              <p style={{fontSize:13,color:'var(--tx2)',margin:'6px 0 10px'}}><strong>{sel.fixedStu.name}</strong> — הוסר מהשבוע</p>
              {!assigningToSlot&&(
                <>
                  <button style={{...S.btn('primary'),width:'100%',marginBottom:8,textAlign:'right'}} onClick={()=>setAssigningToSlot(true)}>📝 שבץ תלמיד אחר לשעה זו</button>
                  <button style={{...S.btn('success'),width:'100%',marginBottom:8}} onClick={()=>handleAction('restore')}>↩️ שחזר {sel.fixedStu.name}</button>
                  <button style={{...S.btn('danger'),width:'100%',marginBottom:8}} onClick={()=>handleAction('block')}>🚫 חסום לחלוטין</button>
                </>
              )}
              {assigningToSlot&&(()=>{
                const alreadyAt=new Set(lessons.filter(l=>l.date===sel.date&&l.time===sel.time&&['scheduled','pending_cancel'].includes(l.status)).map(l=>l.sid));
                const stuList=students.filter(s=>!alreadyAt.has(s.id)&&s.id!==sel.fixedStu.id);
                return(
                  <>
                    <p style={{fontSize:13,fontWeight:600,margin:'0 0 10px',color:'var(--blueD)'}}>שיבוץ תלמיד · {sel.time}</p>

                      stuList.map(s=>(
                        <button key={s.id} style={{...S.btn('default'),marginBottom:5,width:'100%',textAlign:'right'}} onClick={()=>{addLesson({sid:s.id,date:sel.date,time:sel.time,status:'scheduled',reason:'',durationMins:45,weekStart:wkS(sel.date)});setSel(null);setAssigningToSlot(false);}}>
                          {s.name}<span style={{fontSize:11,color:'var(--tx2)',marginRight:6}}> · {s.type==='fixed'?'קבוע':'נייד'}</span>
                        </button>
                      ))
                    )}
                    <button style={{...S.btn('ghost'),width:'100%',marginTop:4}} onClick={()=>setAssigningToSlot(false)}>← חזרה</button>
                  </>
                );
              })()}
            </div>
          )}
          {sel.flexStu&&!sel.isBlocked&&(
            <div style={{direction:'rtl'}}>
              <p style={{fontSize:13,color:'var(--tx2)',margin:'6px 0 14px'}}>נרשם: <strong>{sel.flexStu.name}</strong></p>
              <button style={{...S.btn('danger'),width:'100%',marginBottom:8}} onClick={()=>handleAction('remove_flex')}>הסר מהשעה</button>
            </div>
          )}
          {sel.isExtra&&sel.isEmpty&&!sel.isBlocked&&(
            <div style={{direction:'rtl'}}>
              {!assigningToSlot&&(
                <>
                  <p style={{fontSize:13,color:'var(--tx2)',margin:'6px 0 10px'}}>שעה חריגה — פנויה</p>
                  <button style={{...S.btn('primary'),width:'100%',marginBottom:8,textAlign:'right'}} onClick={()=>setAssigningToSlot(true)}>📝 שבץ תלמיד</button>
                  <button style={{...S.btn('danger'),width:'100%',marginBottom:8}} onClick={()=>handleAction('remove_extra')}>🗑 הסר שעה חריגה</button>
                </>
              )}
              {assigningToSlot&&(()=>{
                const alreadyAt=new Set(lessons.filter(l=>l.date===sel.date&&l.time===sel.time&&['scheduled','pending_cancel'].includes(l.status)).map(l=>l.sid));
                const stuList=students.filter(s=>!alreadyAt.has(s.id));
                return(
                  <>
                    <p style={{fontSize:13,fontWeight:600,margin:'0 0 10px',color:'var(--blueD)'}}>שיבוץ תלמיד · {sel.time}</p>
                    {stuList.length===0?<div style={{fontSize:13,color:'var(--tx2)',textAlign:'center',padding:'12px 0'}}>אין תלמידים זמינים</div>:(
                      stuList.map(s=>(
                        <button key={s.id} style={{...S.btn('default'),marginBottom:5,width:'100%',textAlign:'right'}} onClick={()=>{addLesson({sid:s.id,date:sel.date,time:sel.time,status:'scheduled',reason:'',durationMins:45,weekStart:wkS(sel.date)});setSel(null);setAssigningToSlot(false);}}>
                          {s.name}<span style={{fontSize:11,color:'var(--tx2)',marginRight:6}}> · {s.type==='fixed'?'קבוע':'נייד'}</span>
                        </button>
                      ))
                    )}
                    <button style={{...S.btn('ghost'),width:'100%',marginTop:4}} onClick={()=>setAssigningToSlot(false)}>← חזרה</button>
                  </>
                );
              })()}
            </div>
          )}
          {sel.isOrphaned&&!sel.isBlocked&&(
            <div style={{direction:'rtl'}}>
              <div style={{background:'#fff7ed',borderRadius:8,padding:'10px 12px',marginBottom:10}}>
                <div style={{fontSize:13,fontWeight:600,color:'#9a3412'}}>⚠️ תלמיד שנמחק</div>
              </div>
              <button style={{...S.btn('success'),width:'100%',marginBottom:8}} onClick={()=>handleAction('fix_orphan')}>🔓 הפוך לשעה פנויה</button>
              <button style={{...S.btn('danger'),width:'100%',marginBottom:8}} onClick={()=>handleAction('del_perm')}>🗑 מחק לצמיתות</button>
            </div>
          )}
          {sel.isPermOpen&&!sel.isOrphaned&&!sel.flexStu&&!sel.isBlocked&&(
            <div style={{direction:'rtl'}}>
              {!assigningToSlot&&(
                <>
                  <p style={{fontSize:13,color:'var(--tx2)',margin:'6px 0 10px'}}>שעה פנויה קבועה</p>
                  <button style={{...S.btn('primary'),width:'100%',marginBottom:8,textAlign:'right'}} onClick={()=>setAssigningToSlot(true)}>📝 שבץ תלמיד</button>
                  <button style={{...S.btn('info'),width:'100%',marginBottom:8,textAlign:'right'}} onClick={()=>{setMovingSlot({di:sel.di,t:sel.time,sid:null});setMoveToDi(sel.di);setMoveToT(sel.time);setSel(null);setAssigningToSlot(false);}}>✏️ שנה שעה/יום</button>
                  <button style={{...S.btn('danger'),width:'100%',marginBottom:8}} onClick={()=>handleAction('block')}>🚫 חסום השבוע</button>
                  <button style={{...S.btn('danger'),width:'100%',marginBottom:8}} onClick={()=>handleAction('del_perm')}>🗑 מחק לצמיתות</button>
                </>
              )}
              {assigningToSlot&&(()=>{
                const alreadyAt=new Set(lessons.filter(l=>l.date===sel.date&&l.time===sel.time&&['scheduled','pending_cancel'].includes(l.status)).map(l=>l.sid));
                const stuList=students.filter(s=>!alreadyAt.has(s.id));
                return(
                  <>
                    <p style={{fontSize:13,fontWeight:600,margin:'0 0 10px',color:'var(--blueD)'}}>שיבוץ תלמיד · {sel.time}</p>
                    {stuList.length===0?<div style={{fontSize:13,color:'var(--tx2)',textAlign:'center',padding:'12px 0'}}>אין תלמידים זמינים</div>:(
                      stuList.map(s=>(
                        <button key={s.id} style={{...S.btn('default'),marginBottom:5,width:'100%',textAlign:'right'}} onClick={()=>{addLesson({sid:s.id,date:sel.date,time:sel.time,status:'scheduled',reason:'',durationMins:45,weekStart:wkS(sel.date)});setSel(null);setAssigningToSlot(false);}}>
                          {s.name}<span style={{fontSize:11,color:'var(--tx2)',marginRight:6}}> · {s.type==='fixed'?'קבוע':'נייד'}</span>
                        </button>
                      ))
                    )}
                    <button style={{...S.btn('ghost'),width:'100%',marginTop:4}} onClick={()=>setAssigningToSlot(false)}>← חזרה</button>
                  </>
                );
              })()}
            </div>
          )}
          <button style={{...S.btn('ghost'),width:'100%',marginTop:4}} onClick={()=>setSel(null)}>סגור</button>
        </Modal>
      )}

      {/* Reset confirm */}
      {resetConf&&(
        <Modal onClose={()=>setResetConf(false)}>
          <h3 style={{margin:'0 0 12px',fontSize:16,color:'#dc2626',direction:'rtl'}}>⚠️ איפוס שבוע הבא</h3>
          <p style={{fontSize:13,color:'var(--tx2)',marginBottom:16,direction:'rtl',lineHeight:1.6}}>יוסרו שעות חריגות, חסימות, ביטולי תלמידים, והפרסום לתלמידים.</p>
          <button style={{...S.btn('danger'),width:'100%',marginBottom:8}} onClick={()=>{setExtraSlots([]);setBlockedSlots([]);setCancelledIds([]);setNote('');setWasPublished(false);clearPublishedWeek(NEXT_WK);setResetConf(false);}}>🗑 כן, אפס</button>
          <button style={{...S.btn('ghost'),width:'100%'}} onClick={()=>setResetConf(false)}>ביטול</button>
        </Modal>
      )}

      {/* Move slot modal */}
      {movingSlot&&(
        <Modal onClose={()=>setMovingSlot(null)}>
          <h3 style={{margin:'0 0 6px',fontSize:16,fontWeight:600,direction:'rtl'}}>✏️ שינוי שעה קבועה</h3>
          <p style={{fontSize:12,color:'var(--tx2)',marginBottom:12,direction:'rtl'}}>{DAY[movingSlot.di]} · {movingSlot.t}{movingSlot.sid&&<span style={{color:'var(--txI)',fontWeight:600}}> · {students.find(s=>s.id===movingSlot.sid)?.name}</span>}</p>
          <div style={{marginBottom:12}}><div style={S.lbl}>יום חדש</div>
            <select style={S.inp} value={moveToDi} onChange={e=>setMoveToDi(Number(e.target.value))}>
              {dayOpts.map(o=><option key={o.v} value={o.v}>{o.l}</option>)}
            </select></div>
          <div style={{marginBottom:16}}><div style={S.lbl}>שעה חדשה</div>
            <input type="time" step="300" style={S.inp} value={moveToT} onChange={e=>setMoveToT(e.target.value)}/></div>
          <button style={{...S.btn('primary'),width:'100%',marginBottom:8}} onClick={()=>{if(!validT(moveToT)){alert('שעה לא תקינה');return;}moveBaseSlot(movingSlot.di,movingSlot.t,moveToDi,moveToT);setMovingSlot(null);}}>✅ שמור</button>
          <button style={{...S.btn('ghost'),width:'100%'}} onClick={()=>setMovingSlot(null)}>ביטול</button>
        </Modal>
      )}

      {/* Add open slot */}
      {addingOpen&&(
        <Modal onClose={()=>setAddingOpen(false)}>
          <h3 style={{margin:'0 0 16px',fontSize:16,fontWeight:500,direction:'rtl'}}>הוסף שעה פנויה קבועה</h3>
          <div style={{marginBottom:12}}><div style={S.lbl}>יום</div>
            <select style={S.inp} value={newDi} onChange={e=>setNewDi(Number(e.target.value))}>
              {dayOpts.map(o=><option key={o.v} value={o.v}>{o.l}</option>)}
            </select></div>
          <div style={{marginBottom:16}}><div style={S.lbl}>שעת התחלה</div>
            <input type="time" step="300" style={S.inp} value={newT} onChange={e=>setNewT(e.target.value)}/></div>
          <div style={{...S.row,justifyContent:'space-between'}}>
            <button style={S.btn('ghost')} onClick={()=>setAddingOpen(false)}>ביטול</button>
            <button style={{...S.btn('success'),background:'#ccfbf1',color:'#0f766e',borderColor:'#5eead4'}} onClick={()=>{if(!validT(newT)){alert('שעה לא תקינה');return;}addBaseSlot({sid:null,di:newDi,t:newT});setAddingOpen(false);}}>🔓 הוסף</button>
          </div>
        </Modal>
      )}

      {/* Add exceptional slot */}
      {addingSlot&&(
        <Modal onClose={()=>setAddingSlot(false)}>
          <h3 style={{margin:'0 0 16px',fontSize:16,fontWeight:500,direction:'rtl'}}>הוסף שעה חריגה</h3>
          <div style={{marginBottom:12}}><div style={S.lbl}>יום</div>
            <select style={S.inp} value={newDi} onChange={e=>setNewDi(Number(e.target.value))}>
              {dayOpts.map(o=><option key={o.v} value={o.v}>{o.l}</option>)}
            </select></div>
          <div style={{marginBottom:16}}><div style={S.lbl}>שעת התחלה</div>
            <input type="time" step="300" style={S.inp} value={newT} onChange={e=>setNewT(e.target.value)}/></div>
          <div style={{...S.row,justifyContent:'space-between'}}>
            <button style={S.btn('ghost')} onClick={()=>setAddingSlot(false)}>ביטול</button>
            <button style={S.btn('primary')} onClick={()=>{if(!validT(newT)){alert('שעה לא תקינה');return;}if(!extraSlots.find(e=>e.di===newDi&&e.t===newT))setExtraSlots(es=>[...es,{di:newDi,t:newT}]);setAddingSlot(false);}}>הוסף</button>
          </div>
        </Modal>
      )}
    </div>
  );
}

function TeacherEventsTab({ctx}){
  const {events,addEvent,updEvent,deleteEvent}=ctx;
  const [editEvt,setEditEvt]=useState(null);   // null=closed, {}=new, {id,...}=existing
  const [delConf,setDelConf]=useState(null);
  const [filter,setFilter]=useState('upcoming'); // 'upcoming' | 'all'

  const displayed=useMemo(()=>{
    const base=filter==='upcoming'?events.filter(e=>e.date>=today()):events;
    return [...base].sort((a,b)=>a.date.localeCompare(b.date)||((a.startTime||'').localeCompare(b.startTime||'')));
  },[events,filter]);

  // Group by month
  const grouped=useMemo(()=>{
    const g={};
    displayed.forEach(e=>{
      const m=monOf(e.date);
      if(!g[m])g[m]=[];
      g[m].push(e);
    });
    return g;
  },[displayed]);

  async function handleSave(data){
    try{
      if(editEvt?.id){
        await updEvent(editEvt.id,{...data,price:data.price?Number(data.price):null,paidAmount:data.paidAmount?Number(data.paidAmount):null});
      }else{
        await addEvent({...data,price:data.price?Number(data.price):null,paidAmount:data.paidAmount?Number(data.paidAmount):null});
      }
      setEditEvt(null);
    }catch(e){ alert('שגיאה בשמירה: '+e.message); }
  }

  async function handleDelete(){
    try{
      if(delConf)await deleteEvent(delConf.id);
    }catch(e){ alert('שגיאה במחיקה: '+e.message); }
    setDelConf(null);
  }

  if(editEvt!==null){
    const et=editEvt?.id?ETYPES[editEvt.type]||ETYPES.hagbara:null;
    return(
      <div>
        <button style={{...S.btn('ghost'),padding:'6px 0',marginBottom:12}} onClick={()=>setEditEvt(null)}>← חזרה</button>
        <div style={S.card}>
          <h3 style={{margin:'0 0 16px',fontSize:16,fontWeight:600}}>{editEvt?.id?`✏️ עריכה: ${et.icon} ${editEvt.title}`:'＋ אירוע חדש'}</h3>
          <EventForm initial={editEvt?.id?editEvt:null} onSave={handleSave} onCancel={()=>setEditEvt(null)}/>
        </div>
      </div>
    );
  }

  return(
    <div>
      <div style={{...S.row,justifyContent:'space-between',marginBottom:12}}>
        <div style={{...S.row,gap:0,background:'var(--bg2)',borderRadius:8,padding:3}}>
          {[['upcoming','עתידיים'],['all','כולם']].map(([k,l])=>(
            <button key={k} style={{padding:'6px 14px',fontSize:12,fontWeight:500,borderRadius:6,border:'none',cursor:'pointer',background:filter===k?'#fff':'transparent',color:filter===k?'var(--tx1)':'var(--tx2)',boxShadow:filter===k?'0 1px 3px rgba(0,0,0,.08)':'none'}} onClick={()=>setFilter(k)}>{l}</button>
          ))}
        </div>
        <button style={{...S.btn('primary'),padding:'8px 14px',fontSize:13}} onClick={()=>setEditEvt({})}>＋ אירוע חדש</button>
      </div>

      {displayed.length===0?(
        <div style={{textAlign:'center',padding:'40px 0',color:'var(--tx2)',fontSize:14}}>{filter==='upcoming'?'אין אירועים מתוכננים':'אין אירועים'}</div>
      ):(
        Object.entries(grouped).map(([month,evts])=>(
          <div key={month}>
            <div style={{fontSize:13,fontWeight:600,color:'var(--tx2)',margin:'14px 0 6px'}}>{fmtMon(month)}</div>
            {evts.map(e=>{
              const et=ETYPES[e.type]||ETYPES.performance;
              const ps=PAY_S[e.paidStatus||'unpaid'];
              const dur=e.endTime?`${e.startTime}–${e.endTime}`:e.startTime;
              const isPast=e.date<today();
              return(
                <div key={e.id} style={{...S.card,opacity:isPast?.7:1,borderRight:`4px solid ${et.border}`}}>
                  <div style={{...S.row,justifyContent:'space-between',marginBottom:4}}>
                    <span style={{fontSize:15,fontWeight:600}}>{et.icon} {e.title}</span>
                    <span style={S.bdg(ps.color)}>{ps.label}</span>
                  </div>
                  <div style={{fontSize:13,color:'var(--tx2)',marginBottom:4}}>
                    יום {DAY[pd(e.date).getDay()]} · {dd(e.date)} · {dur}
                    {e.location&&<span> · 📍 {e.location}</span>}
                  </div>
                  {e.price&&(
                    <div style={{fontSize:13,marginBottom:4}}>
                      ₪{e.price}
                      {e.paidStatus==='partial'&&e.paidAmount&&<span style={{color:'var(--txW)'}}> (שולם ₪{e.paidAmount}, נותר ₪{e.price-e.paidAmount})</span>}
                    </div>
                  )}
                  {e.notes&&<div style={{fontSize:12,color:'var(--tx2)',marginBottom:6}}>{e.notes}</div>}
                  <div style={{...S.row,gap:8,marginTop:4}}>
                    <button style={{...S.btn('info'),padding:'5px 12px',fontSize:12}} onClick={()=>setEditEvt(e)}>✏️ ערוך</button>
                    <button style={{...S.btn('danger'),padding:'5px 12px',fontSize:12}} onClick={()=>setDelConf(e)}>🗑 מחק</button>
                  </div>
                </div>
              );
            })}
          </div>
        ))
      )}

      {delConf&&(
        <Modal onClose={()=>setDelConf(null)}>
          <h3 style={{margin:'0 0 10px',fontSize:16,color:'#dc2626',direction:'rtl'}}>מחיקת אירוע</h3>
          <p style={{fontSize:13,color:'var(--tx2)',marginBottom:16,direction:'rtl'}}>למחוק את <strong>{delConf.title}</strong>?</p>
          <button style={{...S.btn('danger'),width:'100%',marginBottom:8}} onClick={handleDelete}>🗑 כן, מחק</button>
          <button style={{...S.btn('ghost'),width:'100%'}} onClick={()=>setDelConf(null)}>ביטול</button>
        </Modal>
      )}
    </div>
  );
}

// ── Students Tab ──────────────────────────────────────────────────────────────
function TeacherStudentsTab({ctx}){
  const {students,lessons,TODAY,THIS_WK,NEXT_WK,pubNext,baseSlots,deleteStudent,addLesson,updLesson,updStudent,changeToFixed,changeToFlexible,addBaseSlot,removeBaseSlot,gcalUrl}=ctx;
  const [sel,setSel]=useState(null);
  const [delPr,setDelPr]=useState(false);
  const [typeModal,setTypeModal]=useState(false);
  const [fixDi,setFixDi]=useState(1);
  const [fixT,setFixT]=useState('09:00');
  const [keepSlotModal,setKeepSlotModal]=useState(false);
  const [moveModal,setMoveModal]=useState(null);
  const [moveSlots,setMoveSlots]=useState([]);
  const [cancelId,setCancelId]=useState(null);
  const [editPrice,setEditPrice]=useState(false);
  const [priceVal,setPriceVal]=useState('');
  const [editContact,setEditContact]=useState(false);
  const [contactPhone,setContactPhone]=useState('');
  const [contactParent,setContactParent]=useState('');
  const [contactParentPhone,setContactParentPhone]=useState('');
  const [addModal,setAddModal]=useState(false);
  const [newName,setNewName]=useState('');
  const [newPhone,setNewPhone]=useState('');
  const [newType,setNewType]=useState('fixed');
  const [newDi,setNewDi]=useState(1);
  const [newTime,setNewTime]=useState('09:00');
  const [newPrice,setNewPrice]=useState('');
  const [newParent,setNewParent]=useState('');
  const [newParentPhone,setNewParentPhone]=useState('');
  const [addBusy,setAddBusy]=useState(false);
  const [lastCode,setLastCode]=useState(null);
  const [assignModal,setAssignModal]=useState(false);
  const [assignDate,setAssignDate]=useState('');
  const [assignTime,setAssignTime]=useState('09:00');
  const [gcalMsg,setGcalMsg]=useState('');

  function showGCal(){ if(gcalUrl){setGcalMsg('📅 עודכן ביומן Google');setTimeout(()=>setGcalMsg(''),3000);} }

  async function addStudent(){
    if(!newName.trim()) return;
    setAddBusy(true);
    try{
      const phone=newPhone.replace(/[^0-9]/g,'');
      const code=phone.length>=6?phone:'STU'+Math.random().toString(36).slice(2,7).toUpperCase();
      const uid='manual_'+Date.now();
      const db=window._db;
      await db.collection('biz_students').doc(uid).set({
        uid, name:newName.trim(), phone:newPhone.trim(), parent:newParent.trim(), parentPhone:newParentPhone.trim(),
        type:newType,
        di:newType==='fixed'?newDi:null,
        t:newType==='fixed'?newTime:null,
        role:'student', status:'approved', loginCode:code,
        pricePerLesson:newPrice?Number(newPrice):0,
        createdAt:firebase.firestore.FieldValue.serverTimestamp()
      });
      if(newType==='fixed') await ctx.addBaseSlot({sid:uid,di:newDi,t:newTime});
      setLastCode(code);
      setNewName(''); setNewPhone(''); setNewType('fixed'); setNewDi(1); setNewTime('09:00'); setNewPrice(''); setNewParent(''); setNewParentPhone('');
    }catch(e){ alert('שגיאה: '+e.message); }
    setAddBusy(false);
  }

  function getStats(sid){
    const my=lessons.filter(l=>l.sid===sid);
    return{
      happened: my.filter(l=>['cancelled_unjustified','no_show','completed'].includes(l.status)||(l.status==='scheduled'&&l.date<TODAY)).length,
      justified:  my.filter(l=>l.status==='cancelled_justified').length,
      unjustified:my.filter(l=>l.status==='cancelled_unjustified').length,
      upcoming:   my.filter(l=>l.status==='scheduled'&&l.date>=TODAY).length,
      pending:    my.filter(l=>l.status==='pending_cancel').length,
    };
  }

  function getOpenSlots(lesson){
    const slots=[];
    const base=baseSlots.filter(s=>validT(s.t)&&(s.sid===null||!students.some(st=>st.id===s.sid&&st.id!==lesson.sid)));
    base.forEach(s=>{
      let d=pd(THIS_WK);let _g=0;while(d.getDay()!==s.di&&_g++<8)d.setDate(d.getDate()+1);
      const date=fd(d);
      if(date<TODAY)return;
      if(date===lesson.date&&s.t===lesson.time)return;
      const taken=lessons.some(l=>l.date===date&&l.time===s.t&&['scheduled','pending_cancel'].includes(l.status)&&l.sid!==lesson.sid&&students.some(st=>st.id===l.sid));
      if(!taken)slots.push({date,time:s.t,di:s.di,week:'this'});
    });
    if(pubNext){
      const nw=[...baseSlots.filter(s=>validT(s.t)&&(s.sid===null||pubNext.cancelledIds?.includes(s.sid))).filter(s=>!pubNext.blockedSlots?.some(b=>b.di===s.di&&b.t===s.t)),
                ...(pubNext.extraSlots||[]).filter(s=>validT(s.t)).filter(s=>!pubNext.blockedSlots?.some(b=>b.di===s.di&&b.t===s.t)).map(s=>({di:s.di,t:s.t,sid:null}))];
      nw.forEach(s=>{
        let d=pd(NEXT_WK);let _g=0;while(d.getDay()!==s.di&&_g++<8)d.setDate(d.getDate()+1);
        const date=fd(d);
        if(date===lesson.date&&s.t===lesson.time)return;
        const taken=lessons.some(l=>l.date===date&&l.time===s.t&&['scheduled','pending_cancel'].includes(l.status)&&l.sid!==lesson.sid&&students.some(st=>st.id===l.sid));
        if(!taken)slots.push({date,time:s.t,di:s.di,week:'next'});
      });
    }
    return slots.sort((a,b)=>(a.date||'').localeCompare(b.date||'')||(a.time||'').localeCompare(b.time||''));
  }

  function getAvailableSlots(){
    const slots=[];
    const base=baseSlots.filter(s=>validT(s.t)&&s.sid===null);
    base.forEach(s=>{
      let d=pd(THIS_WK);let _g=0;while(d.getDay()!==s.di&&_g++<8)d.setDate(d.getDate()+1);
      const date=fd(d);
      if(date<TODAY)return;
      const taken=lessons.some(l=>l.date===date&&l.time===s.t&&['scheduled','pending_cancel'].includes(l.status)&&students.some(st=>st.id===l.sid));
      if(!taken)slots.push({date,time:s.t,di:s.di,week:'this'});
    });
    if(pubNext){
      const nw=[...baseSlots.filter(s=>validT(s.t)&&(s.sid===null||pubNext.cancelledIds?.includes(s.sid))).filter(s=>!pubNext.blockedSlots?.some(b=>b.di===s.di&&b.t===s.t)),
                ...(pubNext.extraSlots||[]).filter(s=>validT(s.t)).filter(s=>!pubNext.blockedSlots?.some(b=>b.di===s.di&&b.t===s.t)).map(s=>({di:s.di,t:s.t,sid:null}))];
      nw.forEach(s=>{
        let d=pd(NEXT_WK);let _g=0;while(d.getDay()!==s.di&&_g++<8)d.setDate(d.getDate()+1);
        const date=fd(d);
        const taken=lessons.some(l=>l.date===date&&l.time===s.t&&['scheduled','pending_cancel'].includes(l.status)&&students.some(st=>st.id===l.sid));
        if(!taken)slots.push({date,time:s.t,di:s.di,week:'next'});
      });
    }
    return slots.sort((a,b)=>a.date.localeCompare(b.date)||a.time.localeCompare(b.time));
  }
  if(sel){
    const stu=students.find(s=>s.id===sel);
    if(!stu){setSel(null);return null;}
    const stats=getStats(sel);
    const history=lessons.filter(l=>l.sid===sel&&!['scheduled','pending_cancel'].includes(l.status)).sort((a,b)=>(b.date||'').localeCompare(a.date||'')).slice(0,20);
    const upcoming=lessons.filter(l=>l.sid===sel&&l.status==='scheduled'&&l.date>=TODAY).sort((a,b)=>(a.date||'').localeCompare(b.date||'')).slice(0,10);
    const pct=Math.min(Math.round(stats.happened/32*100),100);
    return(
      <div>
        <div style={{...S.row,justifyContent:'space-between',marginBottom:12}}>
          <button style={{...S.btn('ghost'),padding:'6px 0'}} onClick={()=>setSel(null)}>← חזרה לרשימה</button>
          <button style={{...S.btn('danger'),padding:'5px 12px',fontSize:12}} onClick={()=>setDelPr(true)}>🗑 מחק תלמיד</button>
        </div>
        <div style={S.card}>
          <div style={{fontSize:18,fontWeight:500,marginBottom:4}}>{stu.name}</div>
          <div style={{fontSize:13,color:'var(--tx2)',marginBottom:12}}>{stu.type==='fixed'?`תלמיד קבוע · יום ${DAY[stu.di]} · ${stu.t}`:'תלמיד נייד'} · קוד: {stu.code}</div>
          <div style={{fontSize:13,marginBottom:8}}><span style={{fontWeight:500}}>{stats.happened}</span> / 32 שיעורים שהתקיימו</div>
          <div style={{height:8,background:'var(--bg2)',borderRadius:4,marginBottom:12,overflow:'hidden'}}>
            <div style={{height:'100%',width:`${pct}%`,background:pct>=100?'var(--txS)':'var(--blue)',borderRadius:4}}/>
          </div>
          <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:8}}>
            {[['התקיימו',stats.happened,'success'],['ממתינים',stats.upcoming,'info'],['מוצדקים',stats.justified,'warning'],['לא מוצדקים',stats.unjustified,'danger']].map(([l,v,c])=>(
              <div key={l} style={{background:`var(--bg${c==='danger'?'D':c==='success'?'S':c==='warning'?'W':'I'})`,borderRadius:'var(--r2)',padding:'8px 10px'}}>
                <div style={{fontSize:11,color:`var(--tx${c==='danger'?'D':c==='success'?'S':c==='warning'?'W':'I'})`}}>{l}</div>
                <div style={{fontSize:20,fontWeight:500,color:`var(--tx${c==='danger'?'D':c==='success'?'S':c==='warning'?'W':'I'})`}}>{v}</div>
              </div>
            ))}
          </div>
        </div>

        {/* Contact info: student phone + parent */}
        <div style={S.card}>
          <div style={{...S.row,justifyContent:'space-between',marginBottom:8}}>
            <span style={{fontSize:13,fontWeight:500}}>פרטי קשר</span>
            {!editContact&&<button style={{...S.btn('info'),padding:'4px 10px',fontSize:11}} onClick={()=>{setContactPhone(stu.phone||'');setContactParent(stu.parent||'');setContactParentPhone(stu.parentPhone||'');setEditContact(true);}}>✏️ ערוך</button>}
          </div>
          {!editContact?(
            <>
              <div style={{fontSize:13,color:'var(--tx2)',marginBottom:4}}>📱 תלמיד: {stu.phone||'—'}</div>
              {stu.parent
                ?<div style={{fontSize:13,color:'var(--tx2)'}}>👤 הורה: {stu.parent}{stu.parentPhone?` · 📱 ${stu.parentPhone}`:''}</div>
                :<div style={{fontSize:13,color:'var(--tx2)'}}>👤 הורה: לא הוגדר</div>}
            </>
          ):(
            <>
              <div style={{marginBottom:8}}><div style={S.lbl}>טלפון תלמיד</div><input type="tel" style={S.inp} value={contactPhone} onChange={e=>setContactPhone(e.target.value)} placeholder="050-0000000"/></div>
              <div style={{marginBottom:8}}><div style={S.lbl}>שם הורה (אופציונלי)</div><input style={S.inp} value={contactParent} onChange={e=>setContactParent(e.target.value)} placeholder="שם פרטי ומשפחה"/></div>
              <div style={{marginBottom:10}}><div style={S.lbl}>טלפון הורה</div><input type="tel" style={S.inp} value={contactParentPhone} onChange={e=>setContactParentPhone(e.target.value)} placeholder="050-0000000"/></div>
              <div style={S.row}>
                <button style={{...S.btn('primary'),flex:1}} onClick={()=>{updStudent(sel,{phone:contactPhone.trim(),parent:contactParent.trim(),parentPhone:contactParentPhone.trim()});setEditContact(false);}}>שמור</button>

        {/* Type management */}
        <div style={S.card}>
          <div style={{...S.row,justifyContent:'space-between',marginBottom:4}}>
            <span style={{fontSize:13,fontWeight:500}}>סוג תלמיד</span>

          {stu.type==='fixed'&&<button style={{...S.btn('warning'),width:'100%',marginTop:6,fontSize:12}} onClick={()=>setKeepSlotModal(true)}>🔓 הפוך לתלמיד נייד</button>}
        </div>

                </div>
              </div>
            ))}
          </div>
        )}

        <div style={{fontSize:13,fontWeight:500,color:'var(--tx2)',margin:'12px 0 6px'}}>היסטוריה</div>
        {history.map(l=>(
          <div key={l.id} style={{...S.card,display:'flex',justifyContent:'space-between',alignItems:'center'}}>
            <div><div style={{fontSize:13,marginBottom:2}}>{dd(l.date)} · {l.time}</div>{l.reason&&<div style={{fontSize:12,color:'var(--tx2)'}}>{l.reason}</div>}<HolBadge date={l.date}/></div>

            <div style={{marginBottom:12}}><div style={S.lbl}>יום קבוע</div><select style={S.inp} value={fixDi} onChange={e=>setFixDi(Number(e.target.value))}>{[0,1,2,3,4].map(d=><option key={d} value={d}>יום {DAY[d]}</option>)}</select></div>

            <button style={{...S.btn('ghost'),width:'100%'}} onClick={()=>setTypeModal(false)}>ביטול</button>
          </Modal>
        )}
        {keepSlotModal&&(
          <Modal onClose={()=>setKeepSlotModal(false)}>

            <p style={{fontSize:13,color:'var(--tx2)',margin:'0 0 16px',direction:'rtl'}}>מה לעשות עם המשבצת של {stu.name}?</p>
            <button style={{...S.btn('success'),width:'100%',marginBottom:8,textAlign:'right'}} onClick={()=>{changeToFlexible(sel,true);setKeepSlotModal(false);}}><div style={{fontWeight:600}}>🔓 הפוך למשבצת פנויה</div></button>
            <button style={{...S.btn('danger'),width:'100%',marginBottom:8,textAlign:'right'}} onClick={()=>{changeToFlexible(sel,false);setKeepSlotModal(false);}}><div style={{fontWeight:600}}>🗑 הסר את המשבצת</div></button>

          </Modal>

        {cancelId&&(()=>{const cl=lessons.find(x=>x.id===cancelId);return(
          <Modal onClose={()=>setCancelId(null)}>
            <h3 style={{margin:'0 0 4px',fontSize:16,color:'#dc2626',direction:'rtl'}}>ביטול שיעור חד פעמי</h3>
            {cl&&<p style={{fontSize:13,color:'var(--tx2)',margin:'0 0 14px',direction:'rtl'}}>יום {DAY[pd(cl.date).getDay()]} · {dd(cl.date)} · {cl.time}</p>}
            <p style={{fontSize:12,color:'var(--tx2)',margin:'0 0 10px',direction:'rtl'}}>בחר סיבת ביטול:</p>
            <button style={{...S.btn('warning'),width:'100%',marginBottom:8,textAlign:'right',padding:'10px 14px'}} onClick={()=>{updLesson(cancelId,{status:'cancelled_justified'});showGCal();setCancelId(null);}}>

            </button>
            <button style={{...S.btn('danger'),width:'100%',marginBottom:8,textAlign:'right',padding:'10px 14px'}} onClick={()=>{updLesson(cancelId,{status:'cancelled_unjustified'});showGCal();setCancelId(null);}}>
              <div><div style={{fontWeight:600}}>❌ לא מוצדק</div><div style={{fontSize:11,marginTop:2,opacity:.8}}>ביטול ללא סיבה מוצדקת — ייספר לחובת התלמיד</div></div>

            <button style={{...S.btn('ghost'),width:'100%'}} onClick={()=>setCancelId(null)}>חזרה</button>

        {moveModal&&(
          <Modal onClose={()=>setMoveModal(null)}>
            <h3 style={{margin:'0 0 6px',fontSize:16,fontWeight:500,direction:'rtl'}}>העברת שיעור</h3>

                if(!ws.length)return null;
                return(<div key={wk} style={{marginBottom:10}}>

                  {ws.map(sl=>(
                    <button key={`${sl.date}_${sl.time}`} style={{...S.btn('default'),marginBottom:5,width:'100%',textAlign:'right'}} onClick={()=>{updLesson(moveModal.id,{status:'moved'});addLesson({sid:moveModal.sid,date:sl.date,time:sl.time,weekStart:wkS(sl.date),status:'scheduled',reason:'',durationMins:45});showGCal();setMoveModal(null);}}>
