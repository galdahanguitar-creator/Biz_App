                    </button>
                  ))}
                </div>);
              })
            )}
            <button style={{...S.btn('ghost'),width:'100%',marginTop:4}} onClick={()=>setMoveModal(null)}>ביטול</button>
          </Modal>
        )}
        {assignModal&&(
          <Modal onClose={()=>setAssignModal(false)}>
            <h3 style={{margin:'0 0 14px',fontSize:16,fontWeight:600,direction:'rtl'}}>📅 שבץ שיעור — {stu.name}</h3>
            {(()=>{const avail=getAvailableSlots();
              if(!avail.length)return <div style={{fontSize:13,color:'var(--tx2)',textAlign:'center',padding:'10px 0'}}>אין שעות פנויות</div>;
              return ['this','next'].map(wk=>{
                const ws=avail.filter(s=>s.week===wk);
                if(!ws.length)return null;
                return(<div key={wk} style={{marginBottom:10}}>
                  <div style={{fontSize:11,fontWeight:600,color:'var(--tx2)',marginBottom:6}}>{wk==='this'?'השבוע':'שבוע הבא'}</div>
                  {ws.map(sl=>(
                    <button key={sl.date+'_'+sl.time} style={{...S.btn('default'),marginBottom:5,width:'100%',textAlign:'right'}} onClick={()=>{addLesson({sid:sel,date:sl.date,time:sl.time,status:'scheduled',reason:'',durationMins:45,weekStart:wkS(sl.date)});setAssignModal(false);}}>
                      יום {DAY[sl.di]} {dd(sl.date)} · {sl.time}
                    </button>
                  ))}
                </div>);
              });
            })()}
            <button style={{...S.btn('ghost'),width:'100%',marginTop:4}} onClick={()=>setAssignModal(false)}>ביטול</button>
          </Modal>
        )}
        {delPr&&(
          <Modal onClose={()=>setDelPr(false)}>
            <div style={{fontSize:16,fontWeight:700,marginBottom:8,direction:'rtl'}}>מחיקת {stu.name}</div>
            {stu.type==='fixed'&&stu.di!=null&&stu.t?(
              <>
                <p style={{fontSize:13,color:'var(--tx2)',margin:'0 0 16px',direction:'rtl'}}>מה לעשות עם המשבצת?<br/><strong>יום {DAY[stu.di]} · {stu.t}</strong></p>
                <button style={{...S.btn('success'),width:'100%',marginBottom:10,textAlign:'right'}} onClick={()=>{addBaseSlot(stu.di,stu.t,null);deleteStudent(sel);setDelPr(false);setSel(null);}}><div style={{fontWeight:700}}>🔓 הפוך למשבצת פנויה</div></button>
                <button style={{...S.btn('danger'),width:'100%',marginBottom:10,textAlign:'right'}} onClick={()=>{deleteStudent(sel);setDelPr(false);setSel(null);}}><div style={{fontWeight:700}}>🗑 מחק את המשבצת</div></button>
              </>
            ):(
              <button style={{...S.btn('danger'),width:'100%',marginBottom:10}} onClick={()=>{deleteStudent(sel);setDelPr(false);setSel(null);}}>🗑 מחק תלמיד</button>
            )}
            <button style={{...S.btn('ghost'),width:'100%'}} onClick={()=>setDelPr(false)}>ביטול</button>
          </Modal>
        )}
      </div>
    );
  }

  return(
    <div>
      <div style={{...S.row,justifyContent:'flex-end',marginBottom:8}}>
        <button style={S.btn('primary')} onClick={()=>{setAddModal(true);setLastCode(null);}}>＋ הוסף תלמיד</button>
      </div>

      {addModal&&(
        <Modal onClose={()=>setAddModal(false)}>
          <h3 style={{margin:'0 0 16px',fontSize:16,fontWeight:600}}>הוסף תלמיד חדש</h3>
          {lastCode?(
            <div style={{textAlign:'center',padding:'8px 0'}}>
              <div style={{fontSize:36,marginBottom:8}}>✅</div>
              <div style={{fontSize:15,fontWeight:600,marginBottom:4}}>{newName||'התלמיד'} נוסף!</div>
              <div style={{fontSize:13,color:'var(--tx2)',marginBottom:12}}>קוד כניסה אישי:</div>
              <div style={{fontSize:28,fontWeight:700,letterSpacing:4,color:'var(--blueD)',background:'var(--bg2)',borderRadius:10,padding:'12px 24px',marginBottom:16}}>{lastCode}</div>
              <div style={{fontSize:12,color:'var(--tx2)',marginBottom:20}}>שמור את הקוד הזה ושלח לתלמיד</div>
              <button style={{...S.btn('primary'),width:'100%'}} onClick={()=>setAddModal(false)}>סגור</button>
            </div>
          ):(
            <>
              {[['שם מלא *',newName,setNewName,'text'],['טלפון',newPhone,setNewPhone,'tel'],['שם הורה (אופציונלי)',newParent,setNewParent,'text'],['טלפון הורה',newParentPhone,setNewParentPhone,'tel']].map(([l,v,s,t])=>(
                <div key={l} style={{marginBottom:10}}>
                  <div style={S.lbl}>{l}</div>
                  <input style={S.inp} type={t} value={v} onChange={e=>s(e.target.value)}/>
                </div>
              ))}
              <div style={{marginBottom:10}}>
                <div style={S.lbl}>סוג</div>
                <div style={{...S.row,gap:0,background:'var(--bg2)',borderRadius:8,padding:3}}>
                  {[['fixed','קבוע'],['flexible','נייד']].map(([k,l])=>(
                    <button key={k} style={{flex:1,padding:'7px 0',fontSize:13,fontWeight:500,borderRadius:6,border:'none',cursor:'pointer',background:newType===k?'#fff':'transparent',color:newType===k?'var(--tx1)':'var(--tx2)'}} onClick={()=>setNewType(k)}>{l}</button>
                  ))}
                </div>
              </div>
              {newType==='fixed'&&(
                <div style={{...S.row,marginBottom:10}}>
                  <div style={{flex:1}}><div style={S.lbl}>יום</div>
                    <select style={S.inp} value={newDi} onChange={e=>setNewDi(Number(e.target.value))}>
                      {[0,1,2,3,4,5].map(d=><option key={d} value={d}>יום {DAY[d]}</option>)}
                    </select></div>
                  <div style={{flex:1}}><div style={S.lbl}>שעה</div>
                    <input type="time" step="900" style={S.inp} value={newTime} onChange={e=>setNewTime(e.target.value)}/></div>
                </div>
              )}
              <div style={{marginBottom:14}}>
                <div style={S.lbl}>מחיר לשיעור (₪)</div>
                <input style={S.inp} type="number" value={newPrice} onChange={e=>setNewPrice(e.target.value)} placeholder="0"/>
              </div>
              <div style={S.row}>
                <button style={{...S.btn('ghost'),flex:1}} onClick={()=>setAddModal(false)}>ביטול</button>
                <button style={{...S.btn('primary'),flex:2}} disabled={!newName.trim()||addBusy} onClick={addStudent}>{addBusy?'מוסיף...':'הוסף תלמיד'}</button>
              </div>
            </>
          )}
        </Modal>
      )}

      {['fixed','flexible'].map(type=>(
        <div key={type}>
          <div style={{fontSize:13,fontWeight:500,color:'var(--tx2)',margin:'10px 0 6px'}}>{type==='fixed'?'תלמידים קבועים':'תלמידים ניידים'}</div>
          {students.filter(s=>s.type===type).map(s=>{
            const stats=getStats(s.id);
            const pct=Math.min(Math.round(stats.happened/32*100),100);
            return(
              <button key={s.id} style={{...S.card,width:'100%',textAlign:'right',cursor:'pointer',display:'block'}} onClick={()=>setSel(s.id)}>
                <div style={{...S.row,justifyContent:'space-between',marginBottom:6}}>
                  <span style={{fontSize:14,fontWeight:500}}>{s.name}</span>
                  <div style={S.row}>
                    {s.pricePerLesson&&<span style={{fontSize:12,color:'var(--txI)'}}>₪{s.pricePerLesson}/שיעור</span>}
                    <span style={{fontSize:13,color:'var(--tx2)'}}>{stats.happened}/32</span>
                  </div>
                </div>
                <div style={{height:5,background:'var(--bg2)',borderRadius:3,overflow:'hidden'}}>
                  <div style={{height:'100%',width:`${pct}%`,background:pct>=100?'#27500A':'var(--blue)',borderRadius:3}}/>
                </div>
                {stats.pending>0&&<span style={{...S.bdg('warning'),marginTop:6,display:'inline-block'}}>ממתין לביטול</span>}
              </button>
            );
          })}
        </div>
      ))}
    </div>
  );
}

// ── Finance Tab ───────────────────────────────────────────────────────────────
function TeacherFinanceTab({ctx}){
  const {lessons,students,events,payments,setPayment,updEvent,TODAY}=ctx;
  const [month,setMonth]=useState(monOf(TODAY));
  const [payModal,setPayModal]=useState(null); // {studentId, totalDue, existing}
  const [payAmt,setPayAmt]=useState('');
  const [payNote,setPayNote]=useState('');
  const [msgModal,setMsgModal]=useState(null); // {stu,phone,text}

  function buildBillMsg(row){
    const{stu,happened,totalDue}=row;
    const stuFirst=firstName(stu.name);
    if(stu.parent){
      const parentFirst=firstName(stu.parent);
      return `שלום ${parentFirst},\nבחודש ${fmtMon(month)} התקיימו ל${stuFirst} ${happened} שיעורים\nסך הכל ${totalDue} ש״ח\nתודה רבה!`;
    }
    return `היי ${stuFirst},\nבחודש ${fmtMon(month)} התקיימו ${happened} שיעורים\nסך הכל ${totalDue} ש״ח\nתודה רבה!`;
  }
  function openMsgModal(row){
    const{stu}=row;
    const phone=stu.parent?(stu.parentPhone||stu.phone):stu.phone;
    setMsgModal({stu,phone,text:buildBillMsg(row)});
  }
  function sendBillMsg(){
    if(!msgModal)return;
    if(!phoneDigits(msgModal.phone)){alert('לא הוגדר מספר טלפון לשליחה — אפשר להוסיף בכרטיס התלמיד');return;}
    window.open(waLink(msgModal.phone,msgModal.text),'waSendTab');
    setMsgModal(null);
  }

  const billing=useMemo(()=>{
    const[ms,me]=monRange(month);
    return students.filter(s=>s.type!=='deleted').map(stu=>{
      const monthLessons=lessons.filter(l=>l.sid===stu.id&&l.date>=ms&&l.date<me);
      const happenedDates=new Set(monthLessons.filter(l=>
        l.status==='completed'||(l.status==='scheduled'&&l.date<TODAY)||l.status==='cancelled_unjustified'||l.status==='no_show'
      ).map(l=>l.date));
      const happened=happenedDates.size;
      const upcoming=new Set(monthLessons.filter(l=>l.status==='scheduled'&&l.date>=TODAY).map(l=>l.date)).size;
      const price=stu.pricePerLesson||0;
      const totalDue=happened*price;
      const pay=payments.find(p=>p.studentId===stu.id&&p.month===month);
      const paid=pay?.amount||0;
      const balance=totalDue-paid;
      return{stu,happened,upcoming,price,totalDue,paid,balance,payNote:pay?.note||''};
    }).filter(r=>r.happened>0||r.upcoming>0||r.paid>0);
  },[lessons,students,payments,month,TODAY]);

  const totals=useMemo(()=>({
    due:billing.reduce((s,r)=>s+r.totalDue,0),
    paid:billing.reduce((s,r)=>s+r.paid,0),
    outstanding:billing.reduce((s,r)=>s+(r.balance>0?r.balance:0),0),
  }),[billing]);

  // Events in this month (with price)
  const monthEvents=useMemo(()=>{
    const[ms,me]=monRange(month);
    return events.filter(e=>e.date>=ms&&e.date<me&&e.price);
  },[events,month]);

  const eventTotals=useMemo(()=>({
    total:monthEvents.reduce((s,e)=>s+(e.price||0),0),
    paid:monthEvents.filter(e=>e.paidStatus==='paid').reduce((s,e)=>s+(e.price||0),0),
  }),[monthEvents]);

  const EVT_STATUS={
    unpaid:   {label:'התקיים',     color:'info',    nextLabel:'שלח בקשת תשלום'},
    requested:{label:'בקשה נשלחה', color:'warning', nextLabel:'✓ סמן שולם'},
    paid:     {label:'שולם ✓',     color:'success', nextLabel:'בטל תשלום'},
  };

  async function advanceEventStatus(ev){
    const next=ev.paidStatus==='paid'?'unpaid':ev.paidStatus==='requested'?'paid':'requested';
    try{ await updEvent(ev.id,{paidStatus:next}); }catch(e){ alert('שגיאה: '+e.message); }
  }

  function openPayModal(row){
    setPayModal(row);
    setPayAmt(String(row.totalDue));
    setPayNote(row.payNote||'');
  }

  async function handlePay(){
    if(!payModal)return;
    try{
      await setPayment(payModal.stu.id,month,Number(payAmt)||0,payNote);
      setPayModal(null);
    }catch(e){ alert('שגיאה: '+e.message); }
  }

  return(
    <div>
      {/* Month selector */}
      <div style={{...S.card,padding:'10px 14px'}}>
        <div style={{...S.row,justifyContent:'space-between',alignItems:'center'}}>
          <button style={{...S.btn('ghost'),padding:'6px 12px',fontSize:16}} onClick={()=>setMonth(prevMon(month))}>‹</button>
          <span style={{fontSize:15,fontWeight:600}}>{fmtMon(month)}</span>
          <button style={{...S.btn('ghost'),padding:'6px 12px',fontSize:16}} onClick={()=>setMonth(nextMon(month))}>›</button>
        </div>
      </div>

      {/* ── Students ── */}
      <div style={{fontSize:13,fontWeight:600,color:'var(--tx2)',margin:'10px 0 6px'}}>🎸 שיעורים</div>
      {billing.length>0&&(
        <div style={{display:'grid',gridTemplateColumns:'1fr 1fr 1fr',gap:8,marginBottom:10}}>
          {[['לגבייה',totals.due,'info'],['שולם',totals.paid,'success'],['חוב',totals.outstanding,'danger']].map(([l,v,c])=>(
            <div key={l} style={{background:`var(--bg${c==='danger'?'D':c==='success'?'S':'I'})`,borderRadius:'var(--r2)',padding:'10px 12px',textAlign:'center'}}>
              <div style={{fontSize:11,color:`var(--tx${c==='danger'?'D':c==='success'?'S':'I'})`,marginBottom:4}}>{l}</div>
              <div style={{fontSize:18,fontWeight:700,color:`var(--tx${c==='danger'?'D':c==='success'?'S':'I'})`}}>₪{v}</div>
            </div>
          ))}
        </div>
      )}

      {billing.length===0?(
        <div style={{textAlign:'center',padding:'24px 0',color:'var(--tx2)',fontSize:14}}>אין שיעורים ב{fmtMon(month)}</div>
      ):(
        billing.map(row=>{
          const{stu,happened,upcoming,price,totalDue,paid,balance}=row;
          const isPaid=balance<=0&&totalDue>0;
          const isPartial=paid>0&&balance>0;
          const borderColor=isPaid?'var(--bd2)':isPartial?'#FAC775':happened>0?'#F7C1C1':'var(--bd3)';
          return(
            <div key={stu.id} style={{...S.card,borderRight:`4px solid ${borderColor}`}}>
              <div style={{...S.row,justifyContent:'space-between',marginBottom:4}}>
                <span style={{fontSize:14,fontWeight:500}}>{stu.name}</span>
                {happened>0&&(isPaid?<span style={S.bdg('success')}>שולם ✓</span>:isPartial?<span style={S.bdg('warning')}>חלקי</span>:<span style={S.bdg('danger')}>לא שולם</span>)}
              </div>
              <div style={{fontSize:13,color:'var(--tx2)',marginBottom:4}}>
                {happened>0?<span>{happened} שיעורים × ₪{price} = <strong>₪{totalDue}</strong></span>:<span style={{color:'var(--txI)'}}>אין שיעורים שהתקיימו עדיין</span>}
                {paid>0&&<span style={{color:isPaid?'var(--txS)':'var(--txW)'}}> · שולם ₪{paid}{balance>0&&` · נותר ₪${balance}`}</span>}
              </div>
              {upcoming>0&&(
                <div style={{fontSize:12,color:'var(--txI)',background:'var(--bgI)',borderRadius:6,padding:'4px 8px',display:'inline-block',marginBottom:6}}>
                  + {upcoming} שיעורים קרובים החודש
                </div>
              )}
              {happened>0&&(
                <div style={{...S.row,marginTop:4}}>
                  <button style={{...S.btn(isPaid?'default':'primary'),flex:1,padding:'7px',fontSize:12}} onClick={()=>openPayModal(row)}>
                    {isPaid?'✏️ עדכן תשלום':'💰 סמן תשלום'}
                  </button>
                  <button style={{...S.btn('success'),flex:1,padding:'7px',fontSize:12}} onClick={()=>openMsgModal(row)}>

// ── GCal Tab ──────────────────────────────────────────────────────────────────
function GCalTab({ctx}){
  const{gcalUrl,setGcalUrl,lessons,students,syncLessonToGCal,syncEventToGCal,events,cleanDuplicateLessons}=ctx;
  const [url,setUrl]=useState(gcalUrl);
  const [copied,setCopied]=useState(false);
  const SCRIPT=`// ═══════════════════════════════════════════════════
// Google Apps Script — הדבק בסקריפט חדש ופרסם כ-Web App
// Execute as: Me  |  Who has access: Anyone
// ═══════════════════════════════════════════════════
function doPost(e) {
  try {
    var d = JSON.parse(e.postData.contents);
    var cal = CalendarApp.getDefaultCalendar();
    var tag = '[BIZ_' + d.bizId + ']';
    // חיפוש ממוקד רק סביב תאריך האירוע (מהיר יותר)
    var searchStart = d.start ? new Date(d.start) : new Date('2020-01-01');
    searchStart.setDate(searchStart.getDate() - 1);
    var searchEnd = d.start ? new Date(d.start) : new Date('2030-01-01');
    searchEnd.setDate(searchEnd.getDate() + 2);
    var existing = cal.getEvents(searchStart, searchEnd).filter(function(ev) {
      return ev.getDescription().includes(tag) || ev.getTitle().includes(tag);
    });
    if (d.action === 'delete') {
      existing.forEach(function(ev) { ev.deleteEvent(); });
    } else if (d.action === 'upsert' || d.action === 'create') {
      var desc = (d.description || '') + ' [BIZ_' + d.bizId + ']';
      if (existing.length > 0) {
        // עדכן קיים (ומחק כפילויות)
        existing[0].setTitle(d.title);
        existing[0].setTime(new Date(d.start), new Date(d.end));
        existing[0].setDescription(desc);
        if (d.location) existing[0].setLocation(d.location);
        if (d.color)    existing[0].setColor(d.color);
        for (var i = 1; i < existing.length; i++) existing[i].deleteEvent();
      } else {
        // צור חדש
        var newEv = cal.createEvent(d.title, new Date(d.start), new Date(d.end),
          { description: desc, location: d.location || '' });
        if (d.color) newEv.setColor(d.color);
      }
    } else if (d.action === 'update') {
      existing.forEach(function(ev) {
        ev.setTitle(d.title);
        ev.setTime(new Date(d.start), new Date(d.end));
        ev.setDescription((d.description || '') + ' [BIZ_' + d.bizId + ']');
        if (d.location) ev.setLocation(d.location);
        if (d.color)    ev.setColor(d.color);
      });
    }
    return ContentService.createTextOutput(JSON.stringify({ok:true}))
      .setMimeType(ContentService.MimeType.JSON);
  } catch(err) {
    return ContentService.createTextOutput(JSON.stringify({error:err.toString()}))
      .setMimeType(ContentService.MimeType.JSON);
  }
}`;
  const [cleanMsg,setCleanMsg]=useState('');
  const [dupMsg,setDupMsg]=useState('');
  async function handleCleanDups(){
    setDupMsg('מנקה...');
    try{
      const count=await cleanDuplicateLessons();
      setDupMsg(count>0?`✓ נמחקו ${count} שיעורים כפולים`:'✓ לא נמצאו כפילויות');
    }catch(e){setDupMsg('שגיאה: '+e.message);}
    setTimeout(()=>setDupMsg(''),6000);
  }
  async function cleanupGCal(){
    if(!gcalUrl)return;
    setCleanMsg('מנקה...');
    const sixMonths=new Date();sixMonths.setMonth(sixMonths.getMonth()+6);
    const cutoff=fd(sixMonths);
    // מחק שיעורים שמעבר ל-6 חודשים
    const farLessons=lessons.filter(l=>l.date>cutoff&&l.sid);
    for(const l of farLessons){ await syncLessonToGCal('delete',l); }
    // upsert שיעורים בטווח (מנקה כפילויות)
    const nearLessons=lessons.filter(l=>l.date<=cutoff&&l.date>=fd(new Date())&&['scheduled','pending_cancel'].includes(l.status)&&l.sid);
    for(const l of nearLessons){ await syncLessonToGCal('upsert',l); }
    setCleanMsg(`✓ נוקו ${farLessons.length} שיעורים רחוקים, עודכנו ${nearLessons.length} קרובים`);
    setTimeout(()=>setCleanMsg(''),5000);
  }
  return(
    <div>
      <div style={S.card}>
        <h3 style={{margin:'0 0 8px',fontSize:15,fontWeight:600}}>📅 סנכרון Google Calendar</h3>
        <p style={{fontSize:13,color:'var(--tx2)',margin:'0 0 16px',lineHeight:1.6}}>כל אירוע (הגברה / הפקה / הופעה) יתווסף ליומן Google שלך אוטומטית.</p>
        <div style={{marginBottom:12}}>
          <div style={S.lbl}>URL של Apps Script</div>
          <input style={S.inp} value={url} onChange={e=>setUrl(e.target.value)} placeholder="https://script.google.com/macros/s/.../exec"/>
        </div>
        <button style={{...S.btn('primary'),width:'100%'}} onClick={()=>setGcalUrl(url)}>שמור</button>
        {gcalUrl&&<div style={{fontSize:12,color:'var(--txS)',marginTop:8,textAlign:'center'}}>✓ URL שמור — הסנכרון פעיל</div>}
      </div>
      <div style={{...S.card,border:'1.5px solid #fca5a5',background:'#fff5f5'}}>
        <div style={{fontSize:14,fontWeight:600,marginBottom:6,color:'#dc2626'}}>🗑 ניקוי שיעורים כפולים</div>
        <p style={{fontSize:13,color:'var(--tx2)',margin:'0 0 12px',lineHeight:1.6}}>בגלל באג שתוקן, כל לחיצה על "פרסם" יצרה עותקים מיותרים. לחץ פעם אחת לניקוי — לא ניתן לבטל.</p>
        <button style={{...S.btn('danger'),width:'100%'}} onClick={handleCleanDups}>🗑 נקה כפילויות</button>
        {dupMsg&&<div style={{fontSize:12,marginTop:8,textAlign:'center',color:dupMsg.startsWith('✓')?'var(--txS)':'var(--txD)'}}>{dupMsg}</div>}
      </div>
      {gcalUrl&&(
        <div style={S.card}>
          <div style={{fontSize:14,fontWeight:600,marginBottom:6}}>🧹 ניקוי יומן</div>
          <p style={{fontSize:13,color:'var(--tx2)',margin:'0 0 12px',lineHeight:1.6}}>מוחק שיעורים שמעבר ל-6 חודשים ומנקה כפילויות בטווח הקרוב.</p>
          <button style={{...S.btn('warning'),width:'100%'}} onClick={cleanupGCal}>ניקוי יומן</button>
          {cleanMsg&&<div style={{fontSize:12,color:'var(--txS)',marginTop:8,textAlign:'center'}}>{cleanMsg}</div>}
        </div>
      )}
      <div style={S.card}>
        <div style={{...S.row,justifyContent:'space-between',marginBottom:10}}>
          <span style={{fontSize:14,fontWeight:600}}>קוד לסקריפט</span>
          <button style={{...S.btn('info'),padding:'5px 12px',fontSize:12}} onClick={()=>{navigator.clipboard?.writeText(SCRIPT);setCopied(true);setTimeout(()=>setCopied(false),2000);}}>
            {copied?'✓ הועתק':'📋 העתק'}
          </button>
        </div>
        <div style={{fontSize:11,color:'var(--tx2)',marginBottom:8,lineHeight:1.6}}>
          1. פתח <strong>script.google.com</strong> · 2. צור פרויקט חדש · 3. הדבק את הקוד · 4. פרסם כ-Web App (Execute as: Me, Anyone can access) · 5. העתק את ה-URL לשדה למעלה
        </div>
        <pre style={{background:'var(--bg2)',borderRadius:8,padding:'10px 12px',fontSize:10,overflowX:'auto',margin:0,direction:'ltr',textAlign:'left',whiteSpace:'pre-wrap'}}>{SCRIPT}</pre>
      </div>
    </div>
  );
}

function StudentMineTab({ctx}){
  const{me,lessons,students,baseSlots,TODAY,THIS_WK,NEXT_WK,pubNext,updLesson,addLesson}=ctx;
  const[cancelModal,setCancelModal]=useState(null);
  const[moveModal,setMoveModal]=useState(null);
  const[moveSuccess,setMoveSuccess]=useState('');
  const[reason,setReason]=useState('');

  const myLessons=useMemo(()=>lessons.filter(l=>l.sid===me.id).sort((a,b)=>(a.date||'').localeCompare(b.date||'')),[lessons,me.id]);
  const upcoming=myLessons.filter(l=>l.status==='scheduled'&&l.date>=TODAY);
  const history=myLessons.filter(l=>!['scheduled','pending_cancel'].includes(l.status)).reverse().slice(0,10);

  const availSlots=useMemo(()=>{
    if(!pubNext)return[];
    const open=baseSlots.filter(s=>validT(s.t)).filter(s=>s.sid===null||pubNext.cancelledIds?.includes(s.sid)||!students.some(st=>st.id===s.sid)).filter(s=>!pubNext.blockedSlots?.some(b=>b.di===s.di&&b.t===s.t));
    const extra=(pubNext.extraSlots||[]).filter(s=>!pubNext.blockedSlots?.some(b=>b.di===s.di&&b.t===s.t)).map(s=>({di:s.di,t:s.t,sid:null}));
    return[...open,...extra].map(slot=>{
      let d=pd(NEXT_WK);let _g=0;while(d.getDay()!==slot.di&&_g++<8)d.setDate(d.getDate()+1);
      const date=fd(d);
      const taken=lessons.some(l=>l.date===date&&l.time===slot.t&&['scheduled','pending_cancel'].includes(l.status)&&students.some(s=>s.id===l.sid));
      return taken?null:{date,time:slot.t,di:slot.di};
    }).filter(Boolean).sort((a,b)=>a.di!==b.di?a.di-b.di:(a.time||'').localeCompare(b.time||''));
  },[pubNext,lessons,NEXT_WK,baseSlots,students]);

  function getMoveSlots(lesson){
    const th=[],nx=[];
    baseSlots.filter(s=>validT(s.t)&&(s.sid===null||!students.some(st=>st.id===s.sid))).forEach(s=>{
      let d=pd(THIS_WK);let _g=0;while(d.getDay()!==s.di&&_g++<8)d.setDate(d.getDate()+1);
      const date=fd(d);
      if(date<TODAY)return;if(hUntil(date,s.t)<2)return;
      if(date===lesson.date&&s.t===lesson.time)return;
      const taken=lessons.some(l=>l.date===date&&l.time===s.t&&['scheduled','pending_cancel'].includes(l.status)&&students.some(st=>st.id===l.sid));
      if(!taken)th.push({date,time:s.t,di:s.di});
    });
    if(pubNext){
      const nw=[...baseSlots.filter(s=>validT(s.t)&&(s.sid===null||pubNext.cancelledIds?.includes(s.sid))).filter(s=>!pubNext.blockedSlots?.some(b=>b.di===s.di&&b.t===s.t)),
                ...(pubNext.extraSlots||[]).filter(s=>validT(s.t)).filter(s=>!pubNext.blockedSlots?.some(b=>b.di===s.di&&b.t===s.t)).map(s=>({di:s.di,t:s.t,sid:null}))];
      nw.forEach(s=>{
        let d=pd(NEXT_WK);let _g=0;while(d.getDay()!==s.di&&_g++<8)d.setDate(d.getDate()+1);
        const date=fd(d);
        if(date===lesson.date&&s.t===lesson.time)return;
        const taken=lessons.some(l=>l.date===date&&l.time===s.t&&['scheduled','pending_cancel'].includes(l.status)&&students.some(st=>st.id===l.sid));
        if(!taken)nx.push({date,time:s.t,di:s.di});
      });
    }
    return{th,nx};
  }

  const myNextLesson=lessons.find(l=>l.sid===me.id&&l.status==='scheduled'&&l.date>=TODAY);

  return(
    <div>
      {/* Next lesson highlight */}
      {myNextLesson&&(
        <div style={{...S.card,background:'var(--bgI)',border:'1.5px solid var(--bd2)',marginBottom:12}}>
          <div style={{fontSize:12,color:'var(--txI)',marginBottom:4}}>השיעור הקרוב שלך</div>
          <div style={{fontSize:17,fontWeight:600,color:'var(--blueD)'}}>יום {DAY[pd(myNextLesson.date).getDay()]} · {dd(myNextLesson.date)}</div>
          <div style={{fontSize:15,color:'var(--blueD)'}}>{myNextLesson.time}</div>
        </div>
      )}

      {/* Book next week */}
      {pubNext&&me.type==='flexible'&&(
        <div style={S.card}>
          <div style={{fontSize:13,fontWeight:500,marginBottom:8}}>📅 שבוע {dd(NEXT_WK)} — שעות פנויות</div>
          {pubNext.note&&<div style={{fontSize:12,color:'var(--tx2)',marginBottom:8,background:'var(--bg2)',borderRadius:6,padding:'6px 10px'}}>{pubNext.note}</div>}
          {availSlots.length===0?<div style={{fontSize:13,color:'var(--tx2)'}}>אין שעות פנויות</div>:(
            availSlots.map(sl=>(
              <button key={`${sl.date}_${sl.time}`} style={{...S.btn('default'),marginBottom:6,width:'100%',textAlign:'right'}} onClick={()=>{addLesson({sid:me.id,date:sl.date,time:sl.time,status:'scheduled',reason:'',durationMins:45,weekStart:wkS(sl.date)});}}>
                יום {DAY[sl.di]} {dd(sl.date)} · {sl.time}
              </button>
            ))
          )}
        </div>
      )}

      {moveSuccess&&<div style={{...S.card,background:'var(--bgS)',border:'1.5px solid #C0DD97',fontSize:13,color:'var(--txS)',textAlign:'center'}}>{moveSuccess}</div>}

      {/* Upcoming lessons */}
      {upcoming.length>0&&(
        <div>
          <div style={{fontSize:13,fontWeight:500,color:'var(--tx2)',margin:'10px 0 6px'}}>שיעורים מתוכננים</div>
          {upcoming.map(l=>{
            const canCancel=hUntil(l.date,l.time)>24;
            const {th,nx}=getMoveSlots(l);
            const canMove=th.length>0||nx.length>0;
            return(
              <div key={l.id} style={{...S.card,display:'flex',justifyContent:'space-between',alignItems:'center'}}>
                <div>
                  <div style={{fontSize:14,fontWeight:500}}>יום {DAY[pd(l.date).getDay()]} · {dd(l.date)}</div>
                  <div style={{fontSize:13,color:'var(--tx2)'}}>{l.time}</div>
                  <HolBadge date={l.date}/>
                </div>
                <div style={S.row}>
                  {canMove&&<button style={{...S.btn('info'),padding:'5px 10px',fontSize:11}} onClick={()=>setMoveModal({lesson:l,th,nx})}>העבר</button>}
                  {canCancel&&<button style={{...S.btn('danger'),padding:'5px 10px',fontSize:11}} onClick={()=>{setCancelModal(l);setReason('');}}>בטל</button>}
                </div>
              </div>
            );
          })}
        </div>
      )}

      {/* History */}
      {history.length>0&&(
        <div>
          <div style={{fontSize:13,fontWeight:500,color:'var(--tx2)',margin:'10px 0 6px'}}>היסטוריה</div>
          {history.map(l=>(
            <div key={l.id} style={{...S.card,display:'flex',justifyContent:'space-between',alignItems:'center'}}>
              <div><div style={{fontSize:13}}>{dd(l.date)} · {l.time}</div>{l.reason&&<div style={{fontSize:12,color:'var(--tx2)'}}>{l.reason}</div>}</div>
              <SBadge status={l.status}/>
            </div>
          ))}
        </div>
      )}

      {cancelModal&&(
        <Modal onClose={()=>setCancelModal(null)}>
          <h3 style={{margin:'0 0 6px',fontSize:16,fontWeight:500,direction:'rtl'}}>בקשת ביטול</h3>
          <p style={{fontSize:13,color:'var(--tx2)',margin:'0 0 14px',direction:'rtl'}}>יום {DAY[pd(cancelModal.date).getDay()]} · {dd(cancelModal.date)} · {cancelModal.time}</p>
          <div style={{marginBottom:16}}><div style={S.lbl}>סיבה (חובה)</div>
            <textarea style={{...S.inp,minHeight:70,resize:'vertical'}} value={reason} onChange={e=>setReason(e.target.value)} placeholder="תאר את הסיבה לביטול..." autoFocus/></div>
          <button style={{...S.btn('warning'),width:'100%',marginBottom:8,opacity:reason.trim()?1:.5}} disabled={!reason.trim()} onClick={()=>{updLesson(cancelModal.id,{status:'pending_cancel',reason:reason.trim()});setCancelModal(null);}}>שלח בקשת ביטול</button>
          <button style={{...S.btn('ghost'),width:'100%'}} onClick={()=>setCancelModal(null)}>ביטול</button>
        </Modal>
      )}

      {moveModal&&(
        <Modal onClose={()=>setMoveModal(null)}>
          <h3 style={{margin:'0 0 6px',fontSize:16,fontWeight:500,direction:'rtl'}}>העברת שיעור</h3>
          <div style={{background:'var(--bg2)',borderRadius:8,padding:'8px 12px',marginBottom:14,direction:'rtl'}}>
            <div style={{fontSize:11,color:'var(--tx2)',marginBottom:2}}>שיעור נוכחי</div>
            <div style={{fontSize:14,fontWeight:500}}>יום {DAY[pd(moveModal.lesson.date).getDay()]} {dd(moveModal.lesson.date)} · {moveModal.lesson.time}</div>
          </div>
          {[['השבוע',moveModal.th],['שבוע הבא',moveModal.nx]].map(([lbl,slots])=>slots.length>0&&(
            <div key={lbl} style={{marginBottom:10}}>
              <div style={{fontSize:11,fontWeight:600,color:'var(--tx2)',marginBottom:6,direction:'rtl'}}>{lbl}</div>
              {slots.map(sl=>(
                <button key={`${sl.date}_${sl.time}`} style={{...S.btn('default'),marginBottom:5,width:'100%',textAlign:'right'}} onClick={()=>{updLesson(moveModal.lesson.id,{status:'moved'});addLesson({sid:me.id,date:sl.date,time:sl.time,status:'scheduled',reason:'',durationMins:45,weekStart:wkS(sl.date)});setMoveModal(null);setMoveSuccess('✅ השיעור הועבר בהצלחה');setTimeout(()=>setMoveSuccess(''),3000);}}>
                  יום {DAY[sl.di]} {dd(sl.date)} · {sl.time}
                </button>
              ))}
            </div>
          ))}
          <button style={{...S.btn('ghost'),width:'100%',marginTop:4}} onClick={()=>setMoveModal(null)}>ביטול</button>
        </Modal>
      )}
    </div>
  );
}

function StudentBoardTab({ctx}){
  const{students,lessons,baseSlots,TODAY,THIS_WK,NEXT_WK,pubNext,me}=ctx;
  const [weekView,setWeekView]=useState('this');

  const days=useMemo(()=>{
    const ws=weekView==='this'?THIS_WK:NEXT_WK;
    return[0,1,2,3,4].map(di=>{let d=pd(ws);let _g=0;while(d.getDay()!==di&&_g++<8)d.setDate(d.getDate()+1);return{date:fd(d),di};});
  },[weekView,THIS_WK,NEXT_WK]);

  const items=useMemo(()=>{
    const ws=weekView==='this'?THIS_WK:NEXT_WK;
    const slots=weekView==='this'?baseSlots:(pubNext?[
      ...baseSlots.filter(s=>!pubNext.cancelledIds?.includes(s.sid)&&!pubNext.blockedSlots?.some(b=>b.di===s.di&&b.t===s.t)),
      ...(pubNext.extraSlots||[]).map(s=>({di:s.di,t:s.t,sid:null})),
    ]:baseSlots);
    const res=[];
    slots.filter(s=>validT(s.t)).forEach(s=>{
      let d=pd(ws);let _g=0;while(d.getDay()!==s.di&&_g++<8)d.setDate(d.getDate()+1);
      const date=fd(d);
      const lesson=lessons.find(l=>l.date===date&&l.time===s.t&&['scheduled','pending_cancel'].includes(l.status));
      const bookedStu=lesson?students.find(st=>st.id===lesson.sid):null;
      const fixedStu=s.sid?students.find(st=>st.id===s.sid):null;
      const occupied=bookedStu||fixedStu;
      const isMe=bookedStu?.id===me.id||fixedStu?.id===me.id;
      res.push({id:`${date}_${s.t}`,date,time:s.t,di:s.di,occupied:!!occupied,isMe,durationMins:45});
    });
    return res;
  },[weekView,THIS_WK,NEXT_WK,baseSlots,lessons,students,pubNext,me]);

  function renderItem(item,top,ht){
    const bg=item.isMe?'#dbeafe':item.occupied?'#f1f5f9':'#dcfce7';
    const fg=item.isMe?'#1e40af':item.occupied?'#94a3b8':'#166534';
    const bd=item.isMe?'#93c5fd':item.occupied?'#cbd5e1':'#86efac';
    const lbl=item.isMe?'✓ שלי':item.occupied?'תפוס':'פנוי';
    return(
      <div key={item.id} style={{position:'absolute',top,left:2,right:2,height:ht,background:bg,border:`1px solid ${bd}`,borderRadius:5,padding:'3px 5px',overflow:'hidden'}}>
        <div style={{fontSize:10,fontWeight:700,color:fg}}>{lbl}</div>
        <div style={{fontSize:9,color:fg}}>{item.time}</div>
      </div>
    );
  }

  return(
    <div>
      <div style={{...S.row,gap:0,marginBottom:10,background:'var(--bg2)',borderRadius:8,padding:3}}>
        {[['this',`השבוע · ${dd(THIS_WK)}`],['next',`שבוע הבא · ${dd(NEXT_WK)}`]].map(([k,l])=>{
          const dis=k==='next'&&!pubNext;
          return(<button key={k} style={{flex:1,padding:'6px 0',fontSize:12,fontWeight:500,borderRadius:6,border:'none',cursor:dis?'not-allowed':'pointer',background:weekView===k?'#fff':'transparent',color:weekView===k?'var(--tx1)':'var(--tx2)',opacity:dis?.45:1,boxShadow:weekView===k?'0 1px 3px rgba(0,0,0,.08)':'none'}} onClick={()=>{if(!dis)setWeekView(k);}}>{l}{dis?' (לא פורסם)':''}</button>);
        })}
      </div>
      {pubNext?.note&&<div style={{fontSize:12,color:'var(--tx2)',marginBottom:8,background:'var(--bgW)',borderRadius:6,padding:'6px 10px'}}>{pubNext.note}</div>}
      <WeekCal days={days} items={items} renderItem={renderItem}/>
      <div style={{...S.row,gap:8,flexWrap:'wrap',marginTop:4}}>
        {[['#dbeafe','#1e40af','השיעור שלי'],['#dcfce7','#166534','פנוי'],['#f1f5f9','#94a3b8','תפוס']].map(([bg,fg,l])=>(
          <div key={l} style={{...S.row,gap:3}}><div style={{width:9,height:9,borderRadius:2,background:bg,border:`1px solid ${fg}`,flexShrink:0}}/><span style={{fontSize:10,color:'var(--tx2)'}}>{l}</span></div>
        ))}
      </div>
    </div>
  );
}

// ─── APP ────────────────────────────────────────────────────────────────────
function App(){
  // ── Simple code-based auth (persisted in localStorage) ──────────────────
  const [user,setUser]=React.useState(()=>{
    try{ const s=localStorage.getItem('biz_user'); return s?JSON.parse(s):null; }catch(e){return null;}
  });
  const [loginErr,setLoginErr]=React.useState('');
  const [approvedInfo,setApprovedInfo]=React.useState(null);
  const [showReg,setShowReg]=React.useState(false);

  function saveUser(u){ localStorage.setItem('biz_user',JSON.stringify(u)); setUser(u); }
  function logout(){ localStorage.removeItem('biz_user'); setUser(null); }

  // Teacher: checks local code
  function loginTeacher(code){
    if(code===TCH_CODE){ saveUser({role:'teacher'}); return true; }
    return false;
  }
  // Student: async lookup by loginCode in Firestore
  async function loginStudent(code){
    if(!code.trim()) return false;
    try{
      const snap=await window._db.collection(C.stu).where('loginCode','==',code.trim()).where('status','==','approved').get();
      if(!snap.empty){
        const d=snap.docs[0].data();
        saveUser({role:'student',uid:snap.docs[0].id,name:d.name});
        return true;
      }
    }catch(e){ console.error('loginStudent',e); }
    return false;
  }

  // ── Data state ──────────────────────────────────────────────────────────
  const [students,setStudents]=React.useState([]);
  const [lessons,setLessons]=React.useState([]);
  const [events,setEvents]=React.useState([]);
  const [payments,setPayments]=React.useState([]);
  const [pendingStudents,setPendingStudents]=React.useState([]);
  const [baseSlots,setBaseSlots]=React.useState([]);
  const [publishedWeeks,setPublishedWeeks]=React.useState({});
  const [gcalUrl,setGcalUrlState]=React.useState(()=>localStorage.getItem('biz_gcal_url')||'');

  // ── Date constants ───────────────────────────────────────────────────────
  const TODAY=today();
  const THIS_WK=wkS(TODAY);
  const NEXT_WK=addD(THIS_WK,7);
  const pubThis=publishedWeeks[THIS_WK];
  const pubNext=publishedWeeks[NEXT_WK];
  const db=window._db;

  // ── Subscriptions ────────────────────────────────────────────────────────
  React.useEffect(()=>{
    if(!user) return;
    const unsubs=[];
    if(user.role==='teacher'){
      unsubs.push(db.collection(C.stu).onSnapshot(s=>setStudents(s.docs.map(d=>({...d.data(),id:d.id})))));
      unsubs.push(db.collection(C.pend).onSnapshot(s=>setPendingStudents(s.docs.map(d=>({...d.data(),id:d.id})))));
    } else {
      unsubs.push(db.collection(C.stu).where('uid','==',user.uid).onSnapshot(s=>setStudents(s.docs.map(d=>({...d.data(),id:d.id})))));
    }
    unsubs.push(db.collection(C.les).onSnapshot(s=>{
      const all=s.docs.map(d=>({...d.data(),id:d.id}));
      // Deduplicate on load: keep non-generated over generated, then earliest id
      const seen=new Set(); const deduped=[];
      [...all].sort((a,b)=>{const ag=a.generated?1:0,bg=b.generated?1:0;if(ag!==bg)return ag-bg;return a.id.localeCompare(b.id);})
        .forEach(l=>{const k=`${l.sid||''}_${l.date}_${l.time||''}`;if(!seen.has(k)){seen.add(k);deduped.push(l);}});
      setLessons(deduped);
    }));
    unsubs.push(db.collection(C.ev).onSnapshot(s=>setEvents(s.docs.map(d=>({...d.data(),id:d.id})).sort((a,b)=>(a.date||'').localeCompare(b.date||'')))));
    unsubs.push(db.collection(C.pay).onSnapshot(s=>setPayments(s.docs.map(d=>({...d.data(),id:d.id})))));
    unsubs.push(db.collection(C.meta).doc('baseSlots').onSnapshot(s=>{
      if(s.exists){
        // Normalize: support both {di,t,sid} (new) and {day,time,studentId} (legacy)
        const raw=s.data().slots||[];
        setBaseSlots(raw.map(slot=>({
          id:slot.id||String(Math.random()),
          di:slot.di!=null?slot.di:(slot.day!=null?slot.day:null),
          t:slot.t||slot.time||null,
          sid:slot.sid||slot.studentId||null,
        })).filter(slot=>slot.di!=null&&slot.t));
      }
    }));
    unsubs.push(db.collection(C.pub).onSnapshot(s=>{ const m={}; s.docs.forEach(d=>{m[d.id]=d.data();}); setPublishedWeeks(m); }));
    return ()=>unsubs.forEach(u=>u());
  },[user]);

  // ── Student CRUD ─────────────────────────────────────────────────────────
  async function updStudent(id,data){ await db.collection(C.stu).doc(id).update(data); }
  async function deleteStudent(id){
    const batch=db.batch();
    batch.delete(db.collection(C.stu).doc(id));
    const ls=await db.collection(C.les).where('studentId','==',id).get();
    ls.docs.forEach(d=>batch.delete(d.ref));
    await batch.commit();
  }
  async function approveStudent(pend){
    const {id,name,phone,di,t,parent}=pend;
    const code='STU'+Math.random().toString(36).slice(2,7).toUpperCase();
    const phone2=(phone||'').replace(/[^0-9]/g,'');
    const finalCode=phone2.length>=6?phone2:code;
    await db.collection(C.stu).doc(id).set({
      uid:id, name, phone:phone||'', parent:parent||'',
      type:(di!=null)?'fixed':'flexible',
      di:di!=null?di:null,
      t:t||null,
      role:'student', status:'approved', loginCode:finalCode,
      pricePerLesson:0, createdAt:firebase.firestore.FieldValue.serverTimestamp()
    });
    await db.collection(C.pend).doc(id).delete();
    setApprovedInfo({name,code});
  }
  async function rejectStudent(id){ await db.collection(C.pend).doc(id).delete(); }
  function clearApprovedInfo(){ setApprovedInfo(null); }

  // ── Lesson CRUD ──────────────────────────────────────────────────────────
  async function addLesson(data){
    const ref=await db.collection(C.les).add({...data,createdAt:firebase.firestore.FieldValue.serverTimestamp()});
    if(gcalUrl&&data.status==='scheduled'&&data.sid&&data.date&&data.time)
      await syncLessonToGCal('create',{...data,id:ref.id});
  }
  async function updLesson(id,data){
    await db.collection(C.les).doc(id).update(data);
    if(gcalUrl&&data.status){
      const l=lessons.find(l=>l.id===id);
      if(l){
        const cancelled=['cancelled_justified','cancelled_unjustified','teacher_cancelled','moved','no_show'];
        if(cancelled.includes(data.status)) await syncLessonToGCal('delete',l);
      }
    }
  }

  // ── Event CRUD ───────────────────────────────────────────────────────────
  async function addEvent(data){
    const ref=await db.collection(C.ev).add({...data,createdAt:firebase.firestore.FieldValue.serverTimestamp()});
    if(gcalUrl) await syncEventToGCal('create',{id:ref.id,...data});
    return ref.id;
  }
  async function updEvent(id,data){
    await db.collection(C.ev).doc(id).update(data);
    if(gcalUrl){
      const oldEv=events.find(e=>e.id===id)||{};
      // מחק ישן ויצור חדש — מטפל נכון בשינוי תאריך (action:'update' לא עובד כשהתאריך השתנה)
      if(oldEv.date) await syncEventToGCal('delete',oldEv);
      await syncEventToGCal('create',{...oldEv,...data,id});
    }
  }
  async function deleteEvent(id){
    if(gcalUrl){
      // תיקון: מעביר את כל נתוני האירוע כולל תאריך כדי שהסקריפט יוכל למצוא אותו
      const ev=events.find(e=>e.id===id);
      await syncEventToGCal('delete',ev||{id});
    }
    await db.collection(C.ev).doc(id).delete();
  }

  // ── Payment CRUD ─────────────────────────────────────────────────────────
  async function setPayment(studentId,month,amount,note){
    const docId=`${studentId}_${month}`;
    if(amount===null||amount===''||amount===undefined){
      await db.collection(C.pay).doc(docId).delete();
    } else {
      await db.collection(C.pay).doc(docId).set({studentId,month,amount:Number(amount),note:note||'',paidAt:firebase.firestore.FieldValue.serverTimestamp()},{merge:true});
    }
  }

  // ── Base slots ───────────────────────────────────────────────────────────
  async function addBaseSlot(slot){
    await db.collection(C.meta).doc('baseSlots').set({slots:[...baseSlots,{...slot,id:Date.now().toString()}]},{merge:true});
  }
  async function removeBaseSlot(slotId){
    await db.collection(C.meta).doc('baseSlots').set({slots:baseSlots.filter(s=>s.id!==slotId)},{merge:true});
  }
  async function moveBaseSlot(slotId,newDay,newTime){
    await db.collection(C.meta).doc('baseSlots').set({slots:baseSlots.map(s=>s.id===slotId?{...s,day:newDay,time:newTime}:s)},{merge:true});
  }
  async function fixOrphanedSlot(lesId,newDay,newTime){ await db.collection(C.les).doc(lesId).update({day:newDay,time:newTime,orphaned:false}); }
  async function changeToFixed(studentId,di,t){
    await db.collection(C.stu).doc(studentId).update({type:'fixed',di,t});
    await addBaseSlot({sid:studentId,di,t});
  }
  async function changeToFlexible(studentId){
    await db.collection(C.stu).doc(studentId).update({type:'flexible',di:null,t:null});
    const slot=baseSlots.find(s=>s.sid===studentId);
    if(slot) await removeBaseSlot(slot.id);
  }

  // ── Week publishing ──────────────────────────────────────────────────────
  async function pubWeek(wkDate,cancelledIds=[],blockedSlots=[],extraSlots=[],note=''){
    // תיקון: מייצר שיעורים לשבוע הספציפי הזה בלבד (לא לכל העתיד)
    const wkLessons=genLessons(students,wkDate).filter(l=>inWk(l.date,wkDate));
    const batch=db.batch();
    // תיקון: מוחק לפי טווח תאריכים (weekStart לא נשמר בשיעורים שנוצרו)
    const existing=lessons.filter(l=>inWk(l.date,wkDate)&&l.generated);
    existing.forEach(l=>batch.delete(db.collection(C.les).doc(l.id)));
    wkLessons.forEach(l=>{
      // תיקון: genLessons לא מחזיר di, משתמשים ב-pd(l.date).getDay()
      const isBlocked=blockedSlots.some(b=>b.di===pd(l.date).getDay()&&b.t===l.time);
      const isCancelled=cancelledIds.includes(l.sid);
      const status=isBlocked||isCancelled?'teacher_cancelled':'scheduled';
      const {id:_fakeid,...lClean}=l;
      batch.set(db.collection(C.les).doc(),{...lClean,status,generated:true,weekStart:wkDate,createdAt:firebase.firestore.FieldValue.serverTimestamp()});
    });
    extraSlots.forEach(e=>{
      let d=pd(wkDate);let _g=0;while(d.getDay()!==e.di&&_g++<8)d.setDate(d.getDate()+1);
      const date=fd(d);
      batch.set(db.collection(C.les).doc(),{sid:null,date,time:e.t,status:'scheduled',generated:true,weekStart:wkDate,createdAt:firebase.firestore.FieldValue.serverTimestamp()});
    });
    batch.set(db.collection(C.pub).doc(wkDate),{published:true,note:note||'',publishedAt:firebase.firestore.FieldValue.serverTimestamp()});
    await batch.commit();
    if(gcalUrl){
      for(const l of wkLessons){
        const isBlocked=blockedSlots.some(b=>b.di===pd(l.date).getDay()&&b.t===l.time);
        const isCancelled=cancelledIds.includes(l.sid);
        if(isBlocked||isCancelled){await syncLessonToGCal('delete',l);}
        else{await syncLessonToGCal('upsert',l);}
      }
    }
  }
  async function clearPublishedWeek(wkDate){
    const batch=db.batch();
    lessons.filter(l=>inWk(l.date,wkDate)&&l.generated).forEach(l=>batch.delete(db.collection(C.les).doc(l.id)));
    batch.delete(db.collection(C.pub).doc(wkDate));
    await batch.commit();
  }

  // ── Cleanup duplicates ────────────────────────────────────────────────────
  async function cleanDuplicateLessons(){
    const seen=new Set();
    const toDelete=[];
    // Keep non-generated (manually set) over generated; among equals keep lexicographically first id
    [...lessons].sort((a,b)=>{
      const ag=a.generated?1:0, bg=b.generated?1:0;
      if(ag!==bg) return ag-bg;
      return a.id.localeCompare(b.id);
    }).forEach(l=>{
      const key=`${l.sid||''}_${l.date}_${l.time||''}`;
      if(seen.has(key)) toDelete.push(l.id);
      else seen.add(key);
    });
    if(!toDelete.length) return 0;
    // Build all batches (max 500 per batch), then run 5 in parallel
    const batches=[];
    for(let i=0;i<toDelete.length;i+=500){
      const chunk=toDelete.slice(i,i+500);
      const batch=db.batch();
      chunk.forEach(id=>batch.delete(db.collection(C.les).doc(id)));
      batches.push(batch);
    }
    for(let i=0;i<batches.length;i+=5){
      await Promise.all(batches.slice(i,i+5).map(b=>b.commit()));
    }
    return toDelete.length;
  }

  // ── GCal sync ────────────────────────────────────────────────────────────
  function setGcalUrl(url){ localStorage.setItem('biz_gcal_url',url); setGcalUrlState(url); }
  async function syncEventToGCal(action,ev){
    if(!gcalUrl) return;
    const et=ETYPES[ev.type]||{label:ev.type||''};
    const title=`${et.label}${ev.title?' - '+ev.title:''}`;
    const startISO=`${ev.date}T${ev.startTime||ev.time||'00:00'}:00`;
    const endISO=`${ev.date}T${ev.endTime||ev.startTime||ev.time||'00:00'}:00`;
    try{
      await fetch(gcalUrl,{method:'POST',mode:'no-cors',headers:{'Content-Type':'application/json'},
        body:JSON.stringify({action,bizId:ev.id,title,start:startISO,end:endISO,location:ev.location||'',description:`${et.label}\n${ev.notes||''}`,color:'6'})});
    }catch(e){ console.warn('GCal sync',e); }
  }
  async function syncLessonToGCal(action,l){
    if(!gcalUrl)return;
    const stu=students.find(s=>s.id===l.sid)||{name:'תלמיד'};
    const endMin=t2m(l.time||'09:00')+(l.durationMins||45);
    try{
      await fetch(gcalUrl,{method:'POST',mode:'no-cors',headers:{'Content-Type':'application/json'},
        body:JSON.stringify({action,bizId:'L'+l.id,title:`שיעור - ${stu.name}`,start:`${l.date}T${l.time}:00`,end:`${l.date}T${m2t(endMin)}:00`,location:'',description:stu.name,color:'7'})});
    }catch(e){console.warn('GCal lesson sync',e);}
  }
  async function syncWeekToGCal(wkDate){
    if(!gcalUrl)return;
    const wkLessons=lessons.filter(l=>inWk(l.date,wkDate)&&['scheduled','pending_cancel'].includes(l.status));
    for(const l of wkLessons){ await syncLessonToGCal('create',l); }
    for(const ev of events.filter(e=>inWk(e.date,wkDate))){ await syncEventToGCal('create',ev); }
  }

  // ── Context ───────────────────────────────────────────────────────────────
  const me=user?.role==='student'?students.find(s=>s.uid===user.uid)||null:null;
  const ctx={
    user,me,students,lessons,events,payments,pendingStudents,baseSlots,publishedWeeks,
    TODAY,THIS_WK,NEXT_WK,pubThis,pubNext,approvedInfo,gcalUrl,
    updStudent,deleteStudent,approveStudent,rejectStudent,clearApprovedInfo,logout,
    addLesson,updLesson,addEvent,updEvent,deleteEvent,setPayment,
    pubWeek,clearPublishedWeek,addBaseSlot,removeBaseSlot,moveBaseSlot,fixOrphanedSlot,
    changeToFixed,changeToFlexible,setGcalUrl,syncWeekToGCal,syncEventToGCal,syncLessonToGCal,
    cleanDuplicateLessons
  };

  // ── Render ────────────────────────────────────────────────────────────────
  if(showReg) return <RegisterView db={db} onBack={()=>setShowReg(false)}/>;
  if(!user) return <LoginView onT={loginTeacher} onS={loginStudent}/>;
  if(user.role==='teacher') return <TeacherView ctx={ctx}/>;
  if(user.role==='student') return <StudentView ctx={ctx}/>;
  return null;
}

// ─── Bootstrap ───────────────────────────────────────────────────────────────
if(!firebase.apps.length){ firebase.initializeApp(FB_CFG); }
window._db=firebase.firestore();

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
